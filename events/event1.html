<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>未读消息 · 大学心理事件簿</title>
<style>
/* === EVENT 1: MUTED BLUE-GREY DIARY AESTHETIC === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#e8ecf0;
  --bg-dark:#d5dce3;
  --card:rgba(255,255,255,0.55);
  --card-hover:rgba(255,255,255,0.85);
  --ink:#2c3e50;
  --ink2:#5a6d7e;
  --ink3:#8fa3b5;
  --ink4:#b8c8d4;
  --blue:#5b8cb5;
  --rose:#b07a8a;
  --amber:#c49a6c;
  --sage:#7a9e8a;
  --red:#c46b6b;
  --font-body:Georgia,"Songti SC","SimSun","Noto Serif CJK SC",serif;
  --font-accent:"Kaiti SC","STKaiti","KaiTi",cursive;
  --font-ui:system-ui,"PingFang SC","Microsoft YaHei",sans-serif;
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 800px 600px at 30% 20%,rgba(91,140,181,0.07) 0%,transparent 70%),radial-gradient(ellipse 600px 400px at 70% 80%,rgba(176,122,138,0.06) 0%,transparent 70%)}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
#app{position:relative;z-index:1;max-width:520px;margin:0 auto;min-height:100vh;padding:0 20px}
.screen{display:none;opacity:0}
.screen.active{display:block;opacity:1;animation:diaryFadeIn 1s ease forwards}
@keyframes diaryFadeIn{from{opacity:0;transform:translateY(16px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes rewind{0%{filter:blur(0);opacity:1}30%{filter:blur(6px);opacity:0.4}70%{filter:blur(6px);opacity:0.4}100%{filter:blur(0);opacity:1}}

/* TITLE SCREEN */
#title-screen{flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center}
#title-screen.active{display:flex;opacity:1;animation:diaryFadeIn 1s ease forwards}
.title-moon{width:90px;height:90px;margin-bottom:36px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#dce4eb 0%,rgba(180,200,215,0.4) 50%,transparent 75%);box-shadow:0 0 60px rgba(91,140,181,0.15);animation:moonGlow 4s ease-in-out infinite}
@keyframes moonGlow{0%,100%{opacity:0.7;box-shadow:0 0 40px rgba(91,140,181,0.1)}50%{opacity:1;box-shadow:0 0 80px rgba(91,140,181,0.2)}}
.title-main{font-family:var(--font-body);font-size:2rem;font-weight:700;letter-spacing:0.12em;color:var(--ink);margin-bottom:8px}
.title-ep{font-family:var(--font-accent);font-size:0.9rem;color:var(--ink3);letter-spacing:0.3em;margin-bottom:48px}
.btn-start{background:transparent;border:1px solid var(--ink4);color:var(--ink2);padding:14px 48px;font-size:0.9rem;letter-spacing:0.25em;cursor:pointer;border-radius:1px;transition:all 0.4s;font-family:var(--font-body)}
.btn-start:hover{border-color:var(--blue);color:var(--blue);box-shadow:0 0 30px rgba(91,140,181,0.1)}

/* GENDER/CHAR SELECT */
#gender-screen,#char-screen{display:none;min-height:100vh;padding-top:20px;text-align:center}
#gender-screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;opacity:1;animation:diaryFadeIn 0.8s ease forwards}
#char-screen.active{display:block;opacity:1;animation:diaryFadeIn 0.8s ease forwards}
.sel-heading{font-family:var(--font-body);font-size:1.1rem;color:var(--ink);margin-bottom:6px}
.sel-sub{font-size:0.78rem;color:var(--ink3);margin-bottom:28px;letter-spacing:0.1em}
.gender-grid{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.gender-card{width:140px;background:var(--card);border:1px solid rgba(0,0,0,0.05);border-radius:10px;padding:24px 18px;cursor:pointer;transition:all 0.3s;text-align:center}
.gender-card:hover{background:var(--card-hover);border-color:rgba(91,140,181,0.3);transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,0.05)}
.gender-icon{font-size:2rem;margin-bottom:8px}
.gender-label{font-size:0.92rem;font-weight:600;color:var(--ink);margin-bottom:4px}
.gender-desc{font-size:0.73rem;color:var(--ink2);line-height:1.5}
.char-grid{display:flex;flex-direction:column;gap:10px;padding:0 4px}
.char-card{display:flex;align-items:flex-start;gap:12px;background:var(--card);border:1px solid rgba(0,0,0,0.05);border-radius:8px;padding:16px 14px;cursor:pointer;transition:all 0.3s}
.char-card:hover{background:var(--card-hover);border-color:rgba(91,140,181,0.3);transform:translateX(4px);box-shadow:0 3px 12px rgba(0,0,0,0.04)}
.char-ava{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;color:#fff}
.char-body{flex:1;min-width:0}
.char-name{font-size:0.9rem;font-weight:600;color:var(--ink);margin-bottom:3px}
.char-trait{font-size:0.72rem;color:var(--blue);margin-bottom:4px}
.char-desc{font-size:0.78rem;line-height:1.65;color:var(--ink2)}

/* EMOTION THERMOMETER */
.thermo-bar{position:sticky;top:0;z-index:100;padding:14px 0 10px;background:linear-gradient(to bottom,var(--bg) 70%,transparent)}
.thermo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.thermo-item{text-align:center}
.thermo-label{font-size:0.65rem;color:var(--ink3);margin-bottom:4px;letter-spacing:0.05em}
.thermo-track{height:4px;border-radius:2px;background:rgba(0,0,0,0.06);overflow:hidden}
.thermo-fill{height:100%;border-radius:2px;transition:width 0.8s cubic-bezier(0.34,1.56,0.64,1)}
.thermo-val{font-size:0.6rem;color:var(--ink3);margin-top:2px;font-variant-numeric:tabular-nums;transition:color 0.3s}
.thermo-val.flash-up{color:var(--sage)}
.thermo-val.flash-down{color:var(--red)}

/* DIARY NARRATION */
.diary-date{font-family:var(--font-accent);font-size:0.85rem;color:var(--ink4);letter-spacing:0.15em;margin:28px 0 6px}
.diary-entry{font-size:0.88rem;line-height:2;color:var(--ink2);margin:16px 0;text-indent:2em;position:relative}
.diary-entry em{color:var(--ink);font-style:normal;font-weight:600}
.diary-entry::before{content:'';position:absolute;left:-12px;top:8px;bottom:8px;width:2px;background:linear-gradient(to bottom,var(--ink4),transparent);border-radius:1px}
.scene-label{font-size:0.72rem;color:var(--rose);letter-spacing:0.2em;margin:32px 0 4px;text-transform:uppercase}
.memory-tag{display:inline-block;background:rgba(91,140,181,0.08);color:var(--blue);font-size:0.7rem;padding:3px 10px;border-radius:2px;margin-bottom:12px;letter-spacing:0.1em}
.rewind-label{text-align:center;font-family:var(--font-accent);font-size:0.85rem;color:var(--ink4);letter-spacing:0.3em;margin:24px 0;animation:rewindPulse 2s ease-in-out}
@keyframes rewindPulse{0%{opacity:0}50%{opacity:1}100%{opacity:0.7}}
.rewind-intro{font-size:0.85rem;line-height:2;color:var(--ink3);font-style:italic;text-align:center;margin:20px 0 8px}
.transition-hint{font-size:0.84rem;line-height:1.8;color:var(--ink3);font-style:italic;text-align:center;margin:18px 0 6px}

/* TIMELINE */
.timeline-bar{display:flex;align-items:center;justify-content:center;gap:0;margin:10px 0 4px;padding:6px 0}
.timeline-node{display:flex;flex-direction:column;align-items:center;min-width:42px}
.timeline-dot{width:9px;height:9px;border-radius:50%;background:var(--ink4);border:2px solid var(--ink4);transition:all 0.5s ease}
.timeline-dot.active{background:var(--blue);border-color:var(--blue);box-shadow:0 0 8px rgba(91,140,181,0.4)}
.timeline-dot.visited{background:var(--ink3);border-color:var(--ink3)}
.timeline-txt{font-size:0.56rem;color:var(--ink4);margin-top:3px;letter-spacing:0.05em;white-space:nowrap;transition:color 0.5s}
.timeline-txt.active{color:var(--blue);font-weight:600}
.timeline-txt.visited{color:var(--ink3)}
.timeline-line{width:18px;height:2px;background:var(--ink4);margin-bottom:13px;transition:background 0.5s}
.timeline-line.visited{background:var(--ink3)}

/* CHOICES */
.choices{margin:20px 0}
.choice-prompt{font-size:0.72rem;color:var(--blue);letter-spacing:0.2em;margin-bottom:12px;font-family:var(--font-accent)}
.choice-btn{display:block;width:100%;background:var(--card);border:1px solid rgba(0,0,0,0.05);border-radius:6px;padding:14px 16px;margin-bottom:8px;text-align:left;color:var(--ink);font-size:0.85rem;line-height:1.6;cursor:pointer;transition:all 0.25s;font-family:var(--font-body);position:relative;overflow:hidden}
.choice-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(91,140,181,0.05),transparent);opacity:0;transition:opacity 0.3s}
.choice-btn:hover{background:var(--card-hover);border-color:rgba(91,140,181,0.3);transform:translateX(4px);box-shadow:0 2px 8px rgba(0,0,0,0.03)}
.choice-btn:hover::before{opacity:1}
.choice-btn:active{transform:translateX(2px) scale(0.99)}
.choice-btn.disabled{opacity:0.25;pointer-events:none}

/* FEEDBACK */
.feedback-box{margin:16px 0;animation:feedIn 0.5s ease forwards}
@keyframes feedIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.feedback-result{background:rgba(255,255,255,0.5);border-radius:6px;padding:14px 16px;font-size:0.85rem;line-height:1.8;color:var(--ink);margin-bottom:10px;border-left:3px solid var(--blue)}
.thermo-change{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.thermo-chip{font-size:0.72rem;padding:3px 8px;border-radius:3px;font-weight:600}
.thermo-chip.up{background:rgba(122,158,138,0.12);color:var(--sage)}
.thermo-chip.down{background:rgba(196,107,107,0.12);color:var(--red)}
.analysis-box{background:linear-gradient(135deg,rgba(91,140,181,0.06),rgba(176,122,138,0.04));border:1px solid rgba(91,140,181,0.12);border-radius:6px;padding:14px 16px;margin:10px 0 20px}
.analysis-label{font-size:0.65rem;letter-spacing:0.2em;color:var(--blue);margin-bottom:6px}
.analysis-text{font-size:0.8rem;line-height:1.8;color:var(--ink2)}
.analysis-text strong{color:var(--rose);font-weight:500}
.btn-continue{display:block;margin:20px auto;background:transparent;border:1px solid rgba(0,0,0,0.08);color:var(--ink3);padding:10px 32px;font-size:0.82rem;cursor:pointer;border-radius:3px;transition:all 0.3s;font-family:var(--font-body);letter-spacing:0.15em}
.btn-continue:hover{border-color:var(--blue);color:var(--blue)}

/* ENDINGS */
.ending-icon{font-size:2.8rem;text-align:center;margin:36px 0 12px}
.ending-title{font-family:var(--font-body);font-size:1.3rem;text-align:center;color:var(--ink);margin-bottom:6px;font-weight:700}
.ending-text{font-size:0.88rem;line-height:2;color:var(--ink2);margin:18px 0;text-indent:2em}
.ending-comment{background:linear-gradient(135deg,rgba(91,140,181,0.06),rgba(176,122,138,0.04));border:1px solid rgba(91,140,181,0.12);border-radius:8px;padding:18px;margin:20px 0}
.ending-comment-label{font-size:0.65rem;color:var(--blue);letter-spacing:0.2em;margin-bottom:8px}
.ending-comment-text{font-size:0.82rem;line-height:1.85;color:var(--ink2)}
.summary-card{background:var(--card);border:1px solid rgba(0,0,0,0.05);border-radius:10px;padding:22px;margin:22px 0;text-align:center}
.summary-item{margin:14px 0}
.summary-label{font-size:0.7rem;color:var(--ink3);letter-spacing:0.15em;margin-bottom:3px}
.summary-value{font-size:1rem;color:var(--ink);font-weight:600}
.summary-meters{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:16px 0;text-align:left}
.summary-meter{background:rgba(0,0,0,0.02);padding:8px 12px;border-radius:4px}
.summary-meter-name{font-size:0.7rem;color:var(--ink3)}
.summary-meter-val{font-size:0.95rem;font-weight:600;color:var(--ink)}
.summary-tip{font-size:0.8rem;color:var(--ink2);line-height:1.8;text-align:left;margin-top:16px;padding-top:14px;border-top:1px solid rgba(0,0,0,0.05)}
.reflect-box{margin:20px 0;padding:18px;border-radius:8px;background:linear-gradient(135deg,rgba(91,140,181,0.04),rgba(176,122,138,0.03));border:1px solid rgba(91,140,181,0.15)}
.reflect-label{font-size:0.65rem;letter-spacing:0.25em;color:var(--blue);margin-bottom:10px;font-weight:600}
.reflect-q{font-size:0.8rem;line-height:1.85;color:var(--ink2);margin:10px 0;padding-left:14px;border-left:2px solid rgba(91,140,181,0.25)}
.reflect-hint{font-size:0.68rem;color:var(--ink3);margin-top:12px;font-style:italic}
.btn-restart{display:inline-block;margin-top:20px;background:rgba(91,140,181,0.06);border:1px solid rgba(91,140,181,0.25);color:var(--blue);padding:11px 36px;font-size:0.85rem;cursor:pointer;border-radius:3px;transition:all 0.3s;font-family:var(--font-body);letter-spacing:0.15em}
.btn-restart:hover{background:rgba(91,140,181,0.12);box-shadow:0 2px 12px rgba(91,140,181,0.08)}
.btn-back{display:inline-block;margin-top:10px;background:transparent;border:1px solid rgba(0,0,0,0.06);color:var(--ink4);padding:9px 28px;font-size:0.8rem;cursor:pointer;border-radius:3px;transition:all 0.3s;font-family:var(--font-body);letter-spacing:0.1em;text-decoration:none}
.btn-back:hover{border-color:rgba(91,140,181,0.3);color:var(--blue)}
.archive-area{margin-top:20px;text-align:center}
.btn-archive{display:inline-block;background:rgba(91,140,181,0.06);border:1px solid rgba(91,140,181,0.25);color:var(--blue);padding:9px 28px;font-size:0.8rem;cursor:pointer;border-radius:3px;transition:all 0.3s;font-family:var(--font-body);letter-spacing:0.1em}
.btn-archive:hover{background:rgba(91,140,181,0.12)}
.archive-code-box{margin-top:12px;background:rgba(91,140,181,0.06);border:1px dashed rgba(91,140,181,0.3);border-radius:6px;padding:12px 16px;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;animation:feedIn 0.4s ease}
.archive-code{font-family:'Courier New',monospace;font-size:1.1rem;font-weight:700;color:var(--blue);letter-spacing:0.08em}
.archive-label{font-size:0.72rem;color:var(--ink3);margin-top:4px}
.btn-copy{background:rgba(91,140,181,0.1);border:1px solid rgba(91,140,181,0.25);color:var(--blue);padding:5px 14px;font-size:0.75rem;cursor:pointer;border-radius:3px;transition:all 0.25s;font-family:var(--font-body)}
.btn-copy:hover{background:rgba(91,140,181,0.2)}
.btn-copy.copied{background:rgba(122,158,138,0.12);border-color:rgba(122,158,138,0.3);color:var(--sage)}
.scroll-anchor{height:1px;width:1px}
/* === MY RECORDS === */
.my-records-block{width:100%;max-width:380px;margin:0 auto 20px}
.my-records-toggle{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;cursor:pointer;background:rgba(91,140,181,0.06);border:1px solid rgba(91,140,181,0.12);border-radius:8px;transition:all 0.3s;user-select:none}
.my-records-toggle:hover{background:rgba(91,140,181,0.1)}
.my-records-label{font-size:0.75rem;letter-spacing:0.1em;color:inherit;opacity:0.6}
.my-records-arrow{font-size:0.7rem;opacity:0.4;transition:transform 0.3s}
.my-records-block.expanded .my-records-arrow{transform:rotate(180deg)}
.my-records-list{max-height:0;overflow:hidden;transition:max-height 0.4s ease,opacity 0.3s ease;opacity:0}
.my-records-block.expanded .my-records-list{max-height:600px;opacity:1;margin-top:8px}
.my-record-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;margin-bottom:4px;background:rgba(91,140,181,0.04);border:1px solid rgba(91,140,181,0.06);border-radius:6px;transition:background 0.2s}
.my-record-item:hover{background:rgba(91,140,181,0.08)}
.my-record-icon{font-size:1.1rem;flex-shrink:0;margin-top:2px}
.my-record-info{flex:1;min-width:0}
.my-record-title{font-size:0.78rem;font-weight:600;line-height:1.4;color:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.my-record-meta{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.my-record-code{font-family:'Courier New',monospace;font-size:0.65rem;opacity:0.5;letter-spacing:0.03em}
.my-record-date{font-size:0.62rem;opacity:0.4}
@media(max-width:540px){#app{padding:0 16px}.title-main{font-size:1.6rem}.choice-btn{padding:12px 12px}.timeline-txt{font-size:0.5rem}.timeline-node{min-width:34px}.timeline-line{width:12px}}
</style>
</head>
<body>
<div id="app">
  <!-- TITLE -->
  <div id="title-screen" class="screen active">
    <div class="title-moon"></div>
    <div class="title-main">未读消息</div>
    <div class="title-ep">大学 · 心理事件簿</div>
    <button class="btn-start" onclick="startGame()">翻 开 日 记</button>
  </div>
  <!-- GENDER -->
  <div id="gender-screen" class="screen">
    <div class="sel-heading">选择你的宿舍</div>
    <div class="sel-sub">不同的宿舍，不同的人际暗流</div>
    <div class="gender-grid">
      <div class="gender-card" onclick="selectGender('F')"><div class="gender-icon">🌙</div><div class="gender-label">女生宿舍</div><div class="gender-desc">407寝室<br>细腻 · 隐忍 · 暗涌</div></div>
      <div class="gender-card" onclick="selectGender('M')"><div class="gender-icon">🔥</div><div class="gender-label">男生宿舍</div><div class="gender-desc">407寝室<br>粗线条 · 直接 · 硬撑</div></div>
    </div>
  </div>
  <!-- CHAR -->
  <div id="char-screen" class="screen">
    <div class="sel-heading">你是谁？</div>
    <div class="sel-sub">选择你的视角，感受不同的内心独白</div>
    <div class="char-grid" id="char-grid"></div>
  </div>
  <!-- GAME -->
  <div id="game-screen" class="screen">
    <div id="timeline-container" style="position:sticky;top:0;z-index:100;padding:14px 0 10px;background:linear-gradient(to bottom,var(--bg) 70%,transparent)"></div>
    <div id="story-container"></div>
  </div>
</div>

<script>
/* === RECORD STORAGE === */
function saveGameRecord(eid,code,title,icon,ec){try{var a=JSON.parse(localStorage.getItem('psych_game_records')||'{}');if(!a[eid])a[eid]=[];a[eid].unshift({code:code,title:title,icon:icon,endingCode:ec,ts:Date.now()});if(a[eid].length>20)a[eid]=a[eid].slice(0,20);localStorage.setItem('psych_game_records',JSON.stringify(a));}catch(e){}}
function getGameRecords(eid){try{var a=JSON.parse(localStorage.getItem('psych_game_records')||'{}');return a[eid]||[];}catch(e){return[];}}
function renderRecordsBlock(eid){var recs=getGameRecords(eid);if(!recs.length)return;var ts=document.getElementById('title-screen');if(!ts)return;var btn=ts.querySelector('.btn-start');if(!btn)return;var b=document.createElement('div');b.className='my-records-block';b.innerHTML='<div class="my-records-toggle" onclick="this.parentElement.classList.toggle(\'expanded\')"><span class="my-records-label">\uD83D\uDCCB 我的记录 ('+recs.length+')</span><span class="my-records-arrow">\u25BE</span></div><div class="my-records-list">'+recs.map(function(r){var d=new Date(r.ts);var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');return '<div class="my-record-item"><span class="my-record-icon">'+r.icon+'</span><div class="my-record-info"><div class="my-record-title">'+r.title+'</div><div class="my-record-meta"><span class="my-record-code">'+r.code+'</span><span class="my-record-date">'+ds+'</span></div></div></div>';}).join('')+'</div>';ts.insertBefore(b,btn);}
renderRecordsBlock('E1');
// ============================================================
//  EVENT 1: 未读消息 — REVERSE CHRONOLOGY + EMOTION THERMOMETER
// ============================================================

// --- STATE ---
let gender='F', playerChar='A', currentAct=0, choices=[];
let lastEnding=null;
let meters={A:50,B:50,C:50,D:50};
let endingStyle='';
let endingPattern='';
const storyEl=document.getElementById('story-container');

// --- CHARACTER DATA ---
const CHARS={
  F:{

  } else if(aCount>=1){

      :{A:'你有时候会摘下耳机，有时候又戴上。改变是断断续续的——但至少你开始有了意识。持续下去。',
      B:'你在开口和沉默之间挣扎。这种挣扎本身就说明你在乎。下次挣扎的时候，选择开口。',

  } else {
    style=F?{A:'沉默的旁观者',B:'隐形的新人',C:'缺席的室友',D:'独自崩溃者'}[p]:{A:'戴着耳机的人',B:'透明人',C:'影子室友',D:'沉默到爆炸的人'}[p];

      D:'你扛到了最后，但代价是巨大的。独自承受不是勇敢，是对自己的不公平。下一次，请在崩溃之前寻求帮助——不是因为你弱，而是因为你值得被帮助。'}[p]
      :{A:'你一整个学期都没摘下耳机。不是说物理上的——是心理上的。你把自己隔绝在了一个人的世界里。下学期，试着听一听外面的声音。',

  }
  return {ending,style,tip};
}

// --- UI HELPERS ---
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));const el=document.getElementById(id);if(el){el.classList.add('active');try{window.scrollTo({top:0,behavior:'smooth'})}catch(e){window.scrollTo(0,0)}}}
function appendHTML(html,pos,animate){const d=document.createElement('div');d.innerHTML=html;if(animate==='rewind')d.style.animation='rewind 0.7s ease forwards';storyEl.appendChild(d);if(pos!=='no-scroll'){setTimeout(()=>{try{const rect=d.getBoundingClientRect();const vh=window.innerHeight||document.documentElement.clientHeight;if(rect.top>vh*0.6){window.scrollBy({top:rect.top-vh*0.25,behavior:'smooth'})}else if(rect.top>vh){d.scrollIntoView({behavior:'smooth',block:'center'})}}catch(e){window.scrollBy(0,200)}},150)}}
function disableChoices(){document.querySelectorAll('.choice-btn:not(.disabled)').forEach(b=>b.classList.add('disabled'))}
function fixPerspective(text){
  // When the player IS a character, replace third-person references to that character with first-person
  const myName=CHARS[gender][playerChar].name;
  const isFemale=gender==='F';
  // Replace "小X说" → "我说", "小X的" → "我的", "小X没有" → "我没有", etc.
  // Also handle pronouns "她/他" that follow the character name in the same sentence
  let t=text;
  // Direct name replacements (most common patterns)
  t=t.replace(new RegExp(myName+'说','g'),'我说');
  t=t.replace(new RegExp(myName+'没有','g'),'我没有');
  t=t.replace(new RegExp(myName+'过了','g'),'我过了');
  t=t.replace(new RegExp(myName+'听完','g'),'我听完');
  t=t.replace(new RegExp(myName+'站起来','g'),'我站起来');
  t=t.replace(new RegExp(myName+'看到','g'),'我看到');
  t=t.replace(new RegExp(myName+'愣了','g'),'我愣了');
  t=t.replace(new RegExp(myName+'已经','g'),'我已经');
  t=t.replace(new RegExp(myName+'那天','g'),'我那天');
  t=t.replace(new RegExp(myName+'的闹钟','g'),'我的闹钟');
  t=t.replace(new RegExp(myName+'的眼睛','g'),'我的眼睛');
  t=t.replace(new RegExp(myName+'的字','g'),'我的字');
  t=t.replace(new RegExp(myName+'的头像','g'),'我的头像');
  t=t.replace(new RegExp(myName+'回了','g'),'我回了');
  t=t.replace(new RegExp(myName+'回你','g'),'我回你');
  t=t.replace(new RegExp(myName+'发了','g'),'我发了');
  t=t.replace(new RegExp(myName+'在群','g'),'我在群');
  t=t.replace(new RegExp(myName+'在上铺','g'),'我在上铺');
  t=t.replace(new RegExp(myName+'翻了','g'),'我翻了');
  t=t.replace(new RegExp(myName+'瘦了','g'),'我瘦了');
  t=t.replace(new RegExp(myName+'坐在','g'),'我坐在');
  // Catch-all: remaining "小X" + verb/particle patterns
  t=t.replace(new RegExp(myName+'(的|也|又|还|就|才|先|再|都|不|很|更|最|从|在|是|把|被|跟|给|让|对|向|到)','g'),'我$1');
  // Handle "小X，" or "小X。" at sentence boundaries
  t=t.replace(new RegExp(myName+'([，。？！：；、])','g'),'我$1');
  // Handle "私聊小X" → "私聊我" (when others message the player)
  t=t.replace(new RegExp('私聊'+myName,'g'),'私聊我');
  // Handle "跟小X" → "跟我"
  t=t.replace(new RegExp('跟'+myName,'g'),'跟我');
  // Handle "你看小X是不是" → should not appear when D is player (choice text issue)
  t=t.replace(new RegExp('你看'+myName,'g'),'你看自己');
  // Additional verb patterns
  t=t.replace(new RegExp(myName+'(?=走到|坐下|拿起|放下|打开|关上|站起来|转过身|犹豫|叹气|笑|哭|看|听|说|问|想|觉得|知道|记得|明白|开始|决定|选择|需要|希望|发现|意识到|注意到|感觉|以为|认为|觉得|同意|拒绝|接受|承认|否认|回答|回复|解释|道歉|感谢|抱怨|批评|指责|原谅|理解|支持|鼓励|安慰|陪|帮|找|约|带|送|接|请|叫|催|劝|拦|拉|推|抱)','g'),'我');
  // Handle "小X" before punctuation (broader catch)
  t=t.replace(new RegExp(myName+'(?=[，。？！：；、""])','g'),'我');
  return t;
}

function renderTimeline(activeIdx){
  // activeIdx: -1=opening, 0=mem[0](三月), 1=mem[1](四月), 2=mem[2](五月), 3=mem[3](六月), 4=reveal
  const nodes=[{l:'九月',i:-1},{l:'三月',i:0},{l:'四月',i:1},{l:'五月',i:2},{l:'六月',i:3}];
  let h='<div class="timeline-bar">';
  nodes.forEach((n,ni)=>{
    const act=n.i===activeIdx;const vis=n.i<activeIdx;
    h+='<div class="timeline-node"><div class="timeline-dot'+(act?' active':vis?' visited':'')+'"></div><div class="timeline-txt'+(act?' active':vis?' visited':'')+'">'+n.l+'</div></div>';
    if(ni<nodes.length-1) h+='<div class="timeline-line'+(vis||act?' visited':'')+'"></div>';
  });
  h+='</div>';
  return h;
}

function renderThermoBar(timelineIdx){
  let html='';
  if(timelineIdx!==undefined) html+=renderTimeline(timelineIdx);
  document.getElementById('timeline-container').innerHTML=html;
}
function updateMeters(deltas){
  ['A','B','C','D'].forEach(k=>{
    if(deltas[k]){
      meters[k]=Math.max(0,Math.min(100,meters[k]+deltas[k]));
      const fill=document.getElementById('tf-'+k);
      const val=document.getElementById('tv-'+k);
      if(fill)fill.style.width=meters[k]+'%';
      if(val){val.textContent=meters[k];val.classList.add(deltas[k]>0?'flash-up':'flash-down');setTimeout(()=>val.classList.remove('flash-up','flash-down'),1200)}
    }
  });
}

function showMemory(idx){
  try{
  renderThermoBar(idx);
  const scenes=getScenes();
  const mem=scenes.memories[idx];
  if(!mem){console.error('No memory at index',idx);return}
  currentAct=idx;
  const lines=mem.narr.split('\n\n');
  let html='<div class="scene-label">'+mem.label+'</div><div class="diary-date">'+mem.date+'</div>';
  lines.forEach(l=>{if(l.trim())html+='<div class="diary-entry">'+l+'</div>'});
  html+='<div class="choices"><div class="choice-prompt">—— 你 的 选 择 ——</div>';
  mem.choices.forEach((c,i)=>{
    html+='<button class="choice-btn" onclick="memoryChoose('+idx+','+i+')">'+fixPerspective(c.text)+'</button>';
  });
  html+='</div>';
  appendHTML(html,undefined,'rewind');
  }catch(e){console.error('showMemory error:',e);document.getElementById('story-container').innerHTML+='<div style="padding:20px;color:red">加载出错，请刷新页面重试</div>'}
}

function memoryChoose(memIdx,choiceIdx){
  disableChoices();
  choices.push(choiceIdx);
  const scenes=getScenes();
  const mem=scenes.memories[memIdx];
  const ch=mem.choices[choiceIdx];
  const fb=mem.feedback[choiceIdx];
  updateMeters(ch.deltas);

  let chipHtml='<div class="thermo-change">';
  ['A','B','C','D'].forEach(k=>{
    if(ch.deltas[k]){
      const cls=ch.deltas[k]>0?'up':'down';
      const sign=ch.deltas[k]>0?'+':'';
      chipHtml+='<span class="thermo-chip '+cls+'">'+CHARS[gender][k].name+' '+sign+ch.deltas[k]+'</span>';
    }
  });
  chipHtml+='</div>';

  let html='<div class="feedback-box">'+chipHtml+'<div class="feedback-result">'+fixPerspective(fb.result)+'</div><div class="analysis-box"><div class="analysis-label">心 理 解 析</div><div class="analysis-text">'+fixPerspective(fb.analysis)+'</div></div>';
  const transHints=['裂痕出现了。接下来的那个月，又发生了什么？','事情在发酵。矛盾越来越深——','离那最后一晚，只剩一个月了——'];
  if(memIdx<3){
    const btnTexts=['下 个 月','继 续','最 后 一 晚'];
    html+='<div class="transition-hint">'+transHints[memIdx]+'</div>';
    html+='<div class="rewind-label">—— 时 间 推 进 ——</div><button class="btn-continue" onclick="showMemory('+(memIdx+1)+')">'+btnTexts[memIdx]+'</button>';
  } else {
    html+='<div class="transition-hint">从三月到六月，所有的选择层层叠加。现在——让我们回到九月一日，看看结果。</div>';
    html+='<div class="rewind-label">—— 回 到 现 在 ——</div><button class="btn-continue" onclick="showFinalReveal()">揭 晓 结 局</button>';
  }
  html+='</div>';
  appendHTML(html);
}

function showFinalReveal(){
  renderThermoBar(4);
  const {ending,style,tip}=getEnding();
  endingStyle=style;
  lastEnding=ending;
  const ch=CHARS[gender][playerChar];

  let html='<div class="scene-label">九月一日 · 真实的此刻</div>';
  html+='<div class="ending-icon">'+ending.icon+'</div>';
  html+='<div class="ending-title">'+ending.title+'</div>';
  ending.text.split('\n\n').forEach(l=>{if(l.trim())html+='<div class="ending-text">'+l+'</div>'});
  html+='<div class="ending-comment"><div class="ending-comment-label">结 局 评 语</div><div class="ending-comment-text">'+ending.comment+'</div></div>';
  html+='<div class="summary-card"><div class="summary-item"><div class="summary-label">扮演角色</div><div class="summary-value">'+ch.name+' · '+ch.trait+'</div></div>';
  html+='<div class="summary-meters" style="grid-template-columns:1fr">';
  html+='<div class="summary-meter" style="text-align:center;padding:12px 16px"><div class="summary-meter-name">'+ch.name+' · '+ch.meterName+'</div><div class="summary-meter-val" style="font-size:1.3rem">'+meters[playerChar]+' / 100</div></div>';
  html+='</div><div class="summary-item"><div class="summary-label">你的关系风格</div><div class="summary-value">'+style+'</div></div>';
  html+='<div class="summary-tip">'+tip+'</div>';
  html+='<div class="reflect-box"><div class="reflect-label">课 后 反 思</div>';
  html+='<div class="reflect-q">回想你的真实宿舍生活——当室友之间出现矛盾时，你通常扮演的是调解者、旁观者，还是当事人？这个角色是你主动选择的，还是被推到那个位置的？</div>';
  html+='<div class="reflect-q">游戏中你做的选择，和你在现实中的习惯一致吗？如果不一致，是什么让你在游戏里做出了不同的选择？</div>';
  html+='<div class="reflect-q">如果时间回到矛盾刚出现的那一刻，你觉得有没有一种方式，可以让所有人都不那么受伤？还是说，"有人受伤"本身就是群体生活的一部分？</div>';
  html+='<div class="reflect-hint">这些问题没有标准答案。可以写在纸上，也可以带到课堂讨论中。</div></div>';
  html+='<div class="archive-area" id="archive-area"><button class="btn-archive" onclick="generateArchiveCode()">生 成 存 档 码</button></div>';
  html+='<button class="btn-restart" onclick="restartGame()">重 新 开 始</button><br><a href="index.html" class="btn-back">返回事件选择</a></div>';
  appendHTML(html,undefined,'rewind');
  document.getElementById('timeline-container').style.display='none';
}

function generateArchiveCode(){
  const patKeys={harmony:'HRM',broken:'BRK',bias:'BIA',complex:'CMP'};
  const eCode=patKeys[endingPattern]||'UNK';
  const code=`E1-${gender}${playerChar}-${choices.join('')}-${eCode}`;
  if(lastEnding)saveGameRecord('E1',code,lastEnding.title,lastEnding.icon,eCode);
  const area=document.getElementById('archive-area');
  if(!area)return;
  area.innerHTML='<div class="archive-code-box"><div><div class="archive-code">'+code+'</div><div class="archive-label">'+CHARS[gender][playerChar].name+' · '+endingStyle+' · 选择路径 '+choices.join('')+'</div></div><button class="btn-copy" onclick="copyCode(this,\''+code+'\')">复制</button></div>';
}
function copyCode(btn,code){
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(code).then(()=>{btn.textContent='已复制';btn.classList.add('copied')}).catch(()=>{btn.textContent='请手动复制';btn.classList.add('copied')})}else{btn.textContent='请手动复制';btn.classList.add('copied')}
}

function restartGame(){
  meters={A:50,B:50,C:50,D:50};choices=[];currentAct=0;endingStyle='';storyEl.innerHTML='';
  document.getElementById('timeline-container').style.display='';
  show('title-screen');
}
</script>
