<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>截止前48小时 · 大学心理事件簿</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#141820;--bg2:#1a1f2b;--bg3:#222833;
  --card:rgba(255,255,255,0.04);--card-hover:rgba(255,255,255,0.08);
  --red:#e74c5e;--red-dim:rgba(231,76,94,0.12);
  --amber:#e7a84c;--amber-dim:rgba(231,168,76,0.12);
  --green:#4ce78a;--green-dim:rgba(76,231,138,0.12);
  --blue:#4c9de7;--blue-dim:rgba(76,157,231,0.12);
  --purple:#9b6fe7;
  --text:#e8eaf0;--text2:#9ba3b5;--text3:#5a6170;
  --font-mono:'Courier New',monospace;
  --font-body:system-ui,'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif;
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 800px 500px at 50% 0%,rgba(231,76,94,0.04) 0%,transparent 70%)}
#app{position:relative;z-index:1;max-width:520px;margin:0 auto;min-height:100vh;padding:0 20px}
.screen{display:none;opacity:0}.screen.active{display:block;animation:fadeUp 0.6s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* TITLE */
#title-screen{text-align:center}
#title-screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;animation:fadeUp 0.8s ease forwards}
.title-timer-decor{font-family:var(--font-mono);font-size:3rem;font-weight:700;color:var(--red);margin-bottom:16px;letter-spacing:0.05em;text-shadow:0 0 40px rgba(231,76,94,0.3);animation:timerGlow 2s ease-in-out infinite}
@keyframes timerGlow{0%,100%{text-shadow:0 0 30px rgba(231,76,94,0.2)}50%{text-shadow:0 0 60px rgba(231,76,94,0.4)}}
.title-main{font-size:1.8rem;font-weight:700;letter-spacing:0.08em;color:var(--text);margin-bottom:6px}
.title-sub{font-size:0.82rem;color:var(--text2);letter-spacing:0.25em;margin-bottom:40px}
.btn-start{background:transparent;border:1px solid var(--red);color:var(--red);padding:14px 44px;font-size:0.9rem;letter-spacing:0.2em;cursor:pointer;border-radius:2px;transition:all 0.3s;font-family:var(--font-body)}
.btn-start:hover{background:var(--red-dim);box-shadow:0 0 30px rgba(231,76,94,0.15)}

/* SELECT */
#gender-screen{display:none;opacity:0;min-height:100vh;text-align:center}
#gender-screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;animation:fadeUp 0.6s ease forwards}
.sel-heading{font-size:1.05rem;color:var(--text);margin-bottom:6px}
.sel-sub{font-size:0.78rem;color:var(--text3);margin-bottom:28px;letter-spacing:0.1em}
.gender-grid{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.gender-card{width:140px;background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:22px 16px;cursor:pointer;transition:all 0.3s;text-align:center}
.gender-card:hover{background:var(--card-hover);border-color:rgba(231,76,94,0.3);transform:translateY(-3px);box-shadow:0 4px 16px rgba(0,0,0,0.3)}
.gender-icon{font-size:2rem;margin-bottom:8px}
.gender-label{font-size:0.9rem;font-weight:600;color:var(--text);margin-bottom:4px}
.gender-desc{font-size:0.72rem;color:var(--text2);line-height:1.5}
#char-screen{display:none;opacity:0;min-height:100vh;padding-top:20px}
#char-screen.active{display:block;animation:fadeUp 0.6s ease forwards}
.char-grid{display:flex;flex-direction:column;gap:8px}
.char-card{display:flex;align-items:flex-start;gap:12px;background:var(--card);border:1px solid rgba(255,255,255,0.04);border-radius:6px;padding:14px 12px;cursor:pointer;transition:all 0.3s}
.char-card:hover{background:var(--card-hover);border-color:rgba(231,76,94,0.2);transform:translateX(4px)}
.char-ava{width:38px;height:38px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:#fff}
.char-body{flex:1;min-width:0}
.char-name{font-size:0.88rem;font-weight:600;color:var(--text);margin-bottom:2px}
.char-trait{font-size:0.7rem;color:var(--amber);margin-bottom:4px}
.char-desc{font-size:0.76rem;line-height:1.6;color:var(--text2)}

/* DUAL TRACK BAR */
.dual-bar{position:sticky;top:0;z-index:100;padding:12px 0 10px;background:linear-gradient(to bottom,var(--bg) 70%,transparent)}
.countdown{font-family:var(--font-mono);font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:10px;letter-spacing:0.05em;transition:color 0.5s}
.countdown.urgent{color:var(--red);animation:urgentPulse 1s ease-in-out infinite}
@keyframes urgentPulse{0%,100%{opacity:1}50%{opacity:0.6}}
.countdown.normal{color:var(--amber)}
.dual-tracks{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.track{text-align:center}
.track-label{font-size:0.65rem;color:var(--text3);margin-bottom:4px;letter-spacing:0.08em}
.track-bar{height:6px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden}
.track-fill{height:100%;border-radius:3px;transition:width 0.8s cubic-bezier(0.34,1.56,0.64,1)}
.track-fill.progress{background:linear-gradient(90deg,var(--blue),var(--green))}
.track-fill.morale{background:linear-gradient(90deg,var(--amber),var(--red))}
.track-val{font-size:0.7rem;margin-top:3px;font-weight:600;font-variant-numeric:tabular-nums;transition:color 0.3s}

/* CHAT MESSAGES */
.chat-window{background:var(--bg2);border-radius:10px;padding:14px;margin:16px 0;border:1px solid rgba(255,255,255,0.04)}
.chat-header{text-align:center;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.04);margin-bottom:10px}
.chat-header .group-name{font-size:0.8rem;color:var(--text3)}
.chat-msg{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start;animation:msgIn 0.3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.chat-ava{width:32px;height:32px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:600;color:#fff}
.chat-content{flex:1}
.chat-sender{font-size:0.68rem;color:var(--text3);margin-bottom:2px}
.chat-bubble{background:rgba(255,255,255,0.06);padding:8px 12px;border-radius:3px 10px 10px 10px;font-size:0.84rem;line-height:1.6;max-width:85%;color:var(--text)}
.chat-time{font-size:0.6rem;color:var(--text3);margin-top:3px}
.chat-status{text-align:center;font-size:0.7rem;color:var(--text3);padding:6px 0;font-style:italic}
.typing-indicator{color:var(--text3);font-size:0.75rem;padding:4px 0}
.typing-indicator span{animation:blink 1.4s infinite both}
.typing-indicator span:nth-child(2){animation-delay:0.2s}
.typing-indicator span:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,80%,100%{opacity:0.2}40%{opacity:1}}

/* NARRATION */
.inner-thought{font-size:0.82rem;line-height:1.8;color:var(--text2);margin:14px 0;padding:10px 14px;border-left:2px solid rgba(231,76,94,0.3);font-style:italic;background:rgba(231,76,94,0.03);border-radius:0 4px 4px 0}
.scene-title{font-size:0.95rem;color:var(--red);letter-spacing:0.15em;margin:28px 0 6px;font-weight:700}
.time-stamp{font-family:var(--font-mono);font-size:0.72rem;color:var(--text3);letter-spacing:0.1em;margin:20px 0 6px}

/* CHOICES */
.choices{margin:18px 0}
.choice-prompt{font-size:0.7rem;color:var(--red);letter-spacing:0.2em;margin-bottom:10px}
.choice-btn{display:block;width:100%;background:var(--card);border:1px solid rgba(255,255,255,0.04);border-radius:6px;padding:14px 16px;margin-bottom:8px;text-align:left;color:var(--text);font-size:0.84rem;line-height:1.6;cursor:pointer;transition:all 0.25s;font-family:var(--font-body);position:relative;overflow:hidden}
.choice-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(231,76,94,0.04),transparent);opacity:0;transition:opacity 0.3s}
.choice-btn:hover{background:var(--card-hover);border-color:rgba(231,76,94,0.25);transform:translateX(4px);box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.choice-btn:hover::before{opacity:1}
.choice-btn.disabled{opacity:0.2;pointer-events:none}
.choice-tag{display:inline-block;font-size:0.6rem;padding:2px 6px;border-radius:2px;margin-right:6px;font-weight:600}
.choice-tag.push{background:var(--blue-dim);color:var(--blue)}
.choice-tag.care{background:var(--green-dim);color:var(--green)}
.choice-tag.both{background:var(--amber-dim);color:var(--amber)}
.choice-tag.bad{background:var(--red-dim);color:var(--red)}

/* FEEDBACK */
.feedback-box{margin:14px 0;animation:feedIn 0.4s ease forwards}
@keyframes feedIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.feedback-result{background:rgba(255,255,255,0.03);border-radius:6px;padding:12px 14px;font-size:0.84rem;line-height:1.8;color:var(--text);margin-bottom:8px;border-left:3px solid var(--red)}
.dual-change{display:flex;gap:10px;margin-bottom:8px}
.dual-chip{font-size:0.7rem;padding:3px 8px;border-radius:3px;font-weight:600}
.dual-chip.prog-up{background:var(--blue-dim);color:var(--blue)}
.dual-chip.prog-down{background:var(--red-dim);color:var(--red)}
.dual-chip.mor-up{background:var(--green-dim);color:var(--green)}
.dual-chip.mor-down{background:var(--amber-dim);color:var(--amber)}
.analysis-box{background:linear-gradient(135deg,rgba(76,157,231,0.05),rgba(231,76,94,0.03));border:1px solid rgba(76,157,231,0.1);border-radius:6px;padding:12px 14px;margin:8px 0 16px}
.analysis-label{font-size:0.62rem;letter-spacing:0.2em;color:var(--blue);margin-bottom:5px}
.analysis-text{font-size:0.78rem;line-height:1.8;color:var(--text2)}
.analysis-text strong{color:var(--amber);font-weight:500}
.btn-continue{display:block;margin:18px auto;background:transparent;border:1px solid rgba(255,255,255,0.08);color:var(--text3);padding:10px 30px;font-size:0.8rem;cursor:pointer;border-radius:3px;transition:all 0.3s;font-family:var(--font-body);letter-spacing:0.15em}
.btn-continue:hover{border-color:var(--red);color:var(--red)}

/* ENDINGS */
.ending-icon{font-size:2.8rem;text-align:center;margin:32px 0 12px}
.ending-title{font-size:1.3rem;text-align:center;color:var(--text);margin-bottom:6px;font-weight:700}
.ending-text{font-size:0.85rem;line-height:2;color:var(--text2);margin:16px 0}
.ending-comment{background:linear-gradient(135deg,rgba(76,157,231,0.06),rgba(231,76,94,0.04));border:1px solid rgba(76,157,231,0.1);border-radius:8px;padding:16px;margin:18px 0}
.ending-comment-label{font-size:0.62rem;color:var(--blue);letter-spacing:0.2em;margin-bottom:6px}
.ending-comment-text{font-size:0.8rem;line-height:1.85;color:var(--text2)}
.summary-card{background:var(--card);border:1px solid rgba(255,255,255,0.04);border-radius:10px;padding:20px;margin:20px 0;text-align:center}
.summary-item{margin:12px 0}
.summary-label{font-size:0.68rem;color:var(--text3);letter-spacing:0.12em;margin-bottom:3px}
.summary-value{font-size:0.95rem;color:var(--text);font-weight:600}
.summary-dual{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.summary-stat{background:rgba(255,255,255,0.02);padding:10px;border-radius:4px}
.summary-stat-label{font-size:0.68rem;color:var(--text3)}
.summary-stat-val{font-size:1.1rem;font-weight:700}
.summary-tip{font-size:0.78rem;color:var(--text2);line-height:1.8;text-align:left;margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.04)}
.reflect-box{margin:20px 0;padding:18px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(100,160,220,0.2)}
.reflect-label{font-size:0.65rem;letter-spacing:0.25em;color:var(--blue);margin-bottom:10px;font-weight:600}
.reflect-q{font-size:0.78rem;line-height:1.85;color:var(--text2);margin:10px 0;padding-left:14px;border-left:2px solid rgba(100,160,220,0.3)}
.reflect-hint{font-size:0.68rem;color:var(--text3);margin-top:12px;font-style:italic}
.btn-restart{display:inline-block;margin-top:18px;background:var(--red-dim);border:1px solid rgba(231,76,94,0.3);color:var(--red);padding:10px 34px;font-size:0.85rem;cursor:pointer;border-radius:3px;transition:all 0.3s;font-family:var(--font-body);letter-spacing:0.15em}
.btn-restart:hover{background:rgba(231,76,94,0.2)}
.btn-back{display:inline-block;margin-top:10px;background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--text3);padding:9px 28px;font-size:0.78rem;cursor:pointer;border-radius:3px;transition:all 0.3s;font-family:var(--font-body);text-decoration:none}
.btn-back:hover{border-color:rgba(231,76,94,0.3);color:var(--red)}
.scroll-anchor{height:1px;width:1px}
.archive-section{margin-top:18px;background:linear-gradient(135deg,rgba(231,76,94,0.06),rgba(74,158,200,0.06));border:1px solid rgba(231,76,94,0.15);border-radius:6px;padding:16px;text-align:center}
.archive-label{font-size:0.72rem;color:var(--red);letter-spacing:0.25em;margin-bottom:8px}
.archive-code{font-family:'Courier New',monospace;font-size:0.82rem;color:var(--text);background:rgba(255,255,255,0.04);padding:8px 12px;border-radius:4px;margin:8px 0;user-select:all;word-break:break-all;letter-spacing:0.05em}
.btn-copy{background:rgba(231,76,94,0.1);border:1px solid rgba(231,76,94,0.25);color:var(--red);padding:6px 16px;font-size:0.75rem;cursor:pointer;border-radius:3px;transition:all 0.25s;font-family:var(--font-body)}
.btn-copy:hover{background:rgba(231,76,94,0.2)}
.btn-copy.copied{background:rgba(74,158,200,0.12);border-color:rgba(74,158,200,0.3);color:var(--blue)}
.archive-hint{font-size:0.65rem;color:var(--text3);margin-top:6px}
/* === MY RECORDS === */
.my-records-block{width:100%;max-width:380px;margin:0 auto 20px}
.my-records-toggle{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;cursor:pointer;background:rgba(231,76,94,0.06);border:1px solid rgba(231,76,94,0.12);border-radius:8px;transition:all 0.3s;user-select:none}
.my-records-toggle:hover{background:rgba(231,76,94,0.1)}
.my-records-label{font-size:0.75rem;letter-spacing:0.1em;color:inherit;opacity:0.6}
.my-records-arrow{font-size:0.7rem;opacity:0.4;transition:transform 0.3s}
.my-records-block.expanded .my-records-arrow{transform:rotate(180deg)}
.my-records-list{max-height:0;overflow:hidden;transition:max-height 0.4s ease,opacity 0.3s ease;opacity:0}
.my-records-block.expanded .my-records-list{max-height:600px;opacity:1;margin-top:8px}
.my-record-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;margin-bottom:4px;background:rgba(231,76,94,0.04);border:1px solid rgba(231,76,94,0.06);border-radius:6px;transition:background 0.2s}
.my-record-item:hover{background:rgba(231,76,94,0.08)}
.my-record-icon{font-size:1.1rem;flex-shrink:0;margin-top:2px}
.my-record-info{flex:1;min-width:0}
.my-record-title{font-size:0.78rem;font-weight:600;line-height:1.4;color:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.my-record-meta{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.my-record-code{font-family:'Courier New',monospace;font-size:0.65rem;opacity:0.5;letter-spacing:0.03em}
.my-record-date{font-size:0.62rem;opacity:0.4}
@media(max-width:540px){#app{padding:0 16px}.title-main{font-size:1.5rem}.title-timer-decor{font-size:2.4rem}}
</style>
</head>
<body>
<div id="app">
  <div id="title-screen" class="screen active">
    <div class="title-timer-decor">48:00:00</div>
    <div class="title-main">截止前48小时</div>
    <div class="title-sub">大学 · 心理事件簿</div>
    <button class="btn-start" onclick="startGame()">开 始 倒 计 时</button>
  </div>
  <div id="gender-screen" class="screen">
    <div class="sel-heading">选择你的小组</div>
    <div class="sel-sub">同样的压力，不同的应对方式</div>
    <div class="gender-grid">
      <div class="gender-card" onclick="selectGender('F')"><div class="gender-icon">🌙</div><div class="gender-label">女生小组</div><div class="gender-desc">6人学习小组<br>隐忍 · 内耗 · 求全</div></div>
      <div class="gender-card" onclick="selectGender('M')"><div class="gender-icon">🔥</div><div class="gender-label">男生小组</div><div class="gender-desc">6人学习小组<br>硬撑 · 嘴硬 · 面子</div></div>
    </div>
  </div>
  <div id="char-screen" class="screen">
    <div class="sel-heading">选择你的角色</div>
    <div class="sel-sub">每个人都有自己没说出口的秘密</div>
    <div class="char-grid" id="char-grid"></div>
  </div>
  <div id="game-screen" class="screen">
    <div class="dual-bar" id="dual-bar"></div>
    <div id="story-container"></div>
  </div>
</div>

<script>
/* === RECORD STORAGE === */
function saveGameRecord(eid,code,title,icon,ec){try{var a=JSON.parse(localStorage.getItem('psych_game_records')||'{}');if(!a[eid])a[eid]=[];a[eid].unshift({code:code,title:title,icon:icon,endingCode:ec,ts:Date.now()});if(a[eid].length>20)a[eid]=a[eid].slice(0,20);localStorage.setItem('psych_game_records',JSON.stringify(a));}catch(e){}}
function getGameRecords(eid){try{var a=JSON.parse(localStorage.getItem('psych_game_records')||'{}');return a[eid]||[];}catch(e){return[];}}
function renderRecordsBlock(eid){var recs=getGameRecords(eid);if(!recs.length)return;var ts=document.getElementById('title-screen');if(!ts)return;var btn=ts.querySelector('.btn-start');if(!btn)return;var b=document.createElement('div');b.className='my-records-block';b.innerHTML='<div class="my-records-toggle" onclick="this.parentElement.classList.toggle(\'expanded\')"><span class="my-records-label">\uD83D\uDCCB 我的记录 ('+recs.length+')</span><span class="my-records-arrow">\u25BE</span></div><div class="my-records-list">'+recs.map(function(r){var d=new Date(r.ts);var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');return '<div class="my-record-item"><span class="my-record-icon">'+r.icon+'</span><div class="my-record-info"><div class="my-record-title">'+r.title+'</div><div class="my-record-meta"><span class="my-record-code">'+r.code+'</span><span class="my-record-date">'+ds+'</span></div></div></div>';}).join('')+'</div>';ts.insertBefore(b,btn);}
renderRecordsBlock('E2');
// ============================================================
//  EVENT 2: 截止前48小时 — COUNTDOWN + DUAL TRACK
// ============================================================
let gender='F',playerChar='A',currentAct=0,choices=[];
let progress=28,morale=60;
let lastQuadrant='';
let timeLeft='48:00:00';
const storyEl=document.getElementById('story-container');
const TIMES=['48:00:00','36:00:00','12:00:00','02:00:00','00:00:00'];

const CHARS={
  F:{
    A:{name:'小A',color:'#4c9de7',trait:'组长 · 冒名顶替综合症',desc:'被随机指定为组长。每次分配任务都觉得自己不配，害怕被发现"其实什么都不会"。'},
    B:{name:'小B',color:'#e74c5e',trait:'打工人 · 时间极其有限',desc:'在校外奶茶店打工养活自己，每晚十一点才下班。不是不想做——是真的没有时间。'},
    C:{name:'小C',color:'#e7a84c',trait:'完美主义 · 自己的部分改了8遍',desc:'对质量有近乎病态的执念。自己的部分已经重写了八遍还不满意，却没精力帮别人。'},
    D:{name:'小D',color:'#4ce78a',trait:'暴脾气 · 家里刚出事',desc:'群里最先爆发的人。但没人知道——她爸上周刚住院了，她每天都在崩溃边缘。'},
    E:{name:'小E',color:'#9b6fe7',trait:'讨好型 · 答应帮所有人',desc:'答应帮小A做数据、帮小C校对格式、帮小D找资料——结果自己的部分一个字没写。'},

          +'你想起来你在群里说的那些话。每一句都很狠。你骂小B不负责，骂小E光打嘴炮，骂小F不说话。你觉得你在"推进度"。但其实你在发泄。你把对生活的愤怒全倒在了她们身上。\n\n'
          +'她们不应该承受你的怒火。但你控制不了。你爸住院之后你的世界就碎了，而你不知道除了愤怒还能怎么表达。你从来没被教过怎么说"我很疼"。你只被教过怎么说"你们都有问题"。\n\n'
          +'群死了。她们不会再理你了。你不怪她们。你只是——好累。好想有一个人在身边，不需要你做任何事，就待着就好。',

        E: '截止时间过去了。你的部分——空的。\n\n'
          +'不是完全空的。有个标题。有两行字。那是你在帮完所有人之后，凌晨五点打出来的两行字。然后你趴在桌上睡着了。\n\n'
          +'你帮了所有人。从头到尾。帮小A分工、帮小C校对、帮小D找资料、帮小B补数据、帮小F鼓劲。你是这个团队的万能胶。但万能胶自己是没有形状的——它只是把别人粘在一起，自己什么都不是。\n\n'
          +'你知道问题出在哪里。你不敢说"不"。每次有人需要帮忙，你就答应了。不是因为你想帮——是因为你怕不帮就不被喜欢。你的自我价值整个建立在"被别人需要"上面。一旦没人需要你，你就空了。\n\n'
          +'现在你看着自己那份空白的文档，觉得讽刺。你帮了所有人。但你把自己帮没了。\n\n'
          +'群也完了。她们不知道你付出了多少。她们只看到了你"什么都没交"。你的牺牲变成了你的罪名。',

        F: '你坐在黑暗中看着手机。群安静了。彻底安静了。\n\n'

          +'你打了一段说明文字，删了。打了一句"这是我做的"，删了。打了一个"做完了"，删了。最后时间过了。你的文件安安静静地躺在你的电脑里，没有人知道它的存在。\n\n'
          +'你知道这很荒谬。你做了，但因为不敢发出去，等于没做。你的恐惧比截止时间更有力量——它把你钉在原地。你这辈子已经被它钉了太多次了。想举手回答问题——没举。想参加社团面试——没去。想跟室友说"我们一起吃饭"——没说。\n\n'
          +'每一次"没有"都像一块砖，一块块垒起来，把你围在了一个越来越小的世界里。你在那个世界里很安全。但也很孤独。\n\n'
          +'群死了。没有人记得你。你已经习惯了不被记得。但今夜，在黑暗中，你允许自己承认：你不想习惯。你想被看见。你只是不知道怎么做。'
      },
      M: {
        A: '截止了。交了个半成品。成绩D。\n\n'
          +'你是组长。你该负责。但你做了什么？你叹气。你焦虑。你默默补了一些别人没做的部分。但你从头到尾没有——真正地——站出来过。\n\n'
          +'你怕当坏人。怕催促。怕被骂。你想当一个"不得罪人"的组长。但结果是——什么都没推动。你的"好人"是一种伪装。伪装下面是一个不相信自己有能力改变任何事的人。\n\n'
          +'也许你确实改变不了。但也许你没试过。你从一开始就说服自己"我搞不定"——然后你真的没搞定。这不是预言成真——这是你自己投了降。\n\n'
          +'群死了。你知道你可以做得更好。这个认知——虽然痛——至少说明你还没有完全放弃。',

        B: '没交。或者说交了个废纸。\n\n'
          +'你从头到尾什么都没做。不是什么。你做了：你发了表情包。你说了"差不多了"。你打了一局又一局的游戏。你做了所有你不需要做的事，就是没做你需要做的那件。\n\n'
          +'你知道自己有问题。不是懒——是坐不住。每次打开文档，脑子就嗡嗡的。你不知道为什么。你只知道这件事你不想跟任何人说。\n\n'
          +'你用嘴炮掩盖了一切。你以为只要一直笑一直闹，就没人会发现你其实什么都没做。但最后大家都发现了。信任碎了。群死了。你的名字和"不靠谱"绑在了一起。\n\n'
          +'也许——也许你该跟什么人聊聊。不是关于作业。是关于你为什么坐不下来。',

        C: '成绩D。你看了一眼就关了。\n\n'

          +'你很愤怒。你觉得不公平。你付出了最多，结果跟什么都没做的人拿一样的分数。你想骂人。你想退群。你想说"以后再也不帮你们了"。\n\n'
          +'但你没有说。你闷声退了出去。像你一直做的那样——不说话。不解释。把所有的不满吞回去，变成更深的疲惫。\n\n'
          +'也许问题不是"他们不做"。也许问题是"你从来不说"。你不说你需要帮忙。不说你很累。不说你其实也撑不住了。你把"沉默地扛"当成了骄傲——但骄傲最后只剩下你一个人。',

        D: '成绩D。你不在乎。你已经不在乎任何事了。\n\n'
          +'你爸在医院。你在群里炸了。骂了所有人。退了群。你做了所有你不该做的事。然后你一个人坐在床上，手机关机，盯着天花板。\n\n'
          +'你把所有人推开了。不是因为你想——是因为你不知道怎么说"我需要帮忙"。你从小就被教"自己的事自己扛"。你扛了一周。扛到了你的极限。然后你碎了。碎成了愤怒。\n\n'
          +'群死了。他们恨你了吧。你不怪他们。你知道你说了很过分的话。但你也知道——那些话背后是求救。只是你把求救变成了攻击，把"帮帮我"变成了"你们都有问题"。\n\n'
          +'你需要帮助。不是PPT的帮助。是——真正的帮助。',

        E: '成绩D。你还在笑。\n\n'
          +'不是开心的笑。是你那种条件反射的笑。遇到什么事都笑。好事笑。坏事也笑。崩溃了还是笑。你已经不知道不笑的时候自己长什么样了。\n\n'
          +'你帮了所有人。但你自己的部分空白一片。你的时间全给了别人。你的精力全给了"维持团队氛围"——但氛围还是崩了。你的调解没有用。你的讨好没有用。你什么都没做成。\n\n'
          +'最讽刺的是：你是全组最累的人，但也是全组最"看不出来"的人。因为你一直在笑。你的笑是一面墙——挡住了别人看到你的机会，也挡住了你看到自己的机会。\n\n'
          +'你好累。你真的好累。你能不能——不笑了？你能不能就说一句"我也不行了"？',

        F: '群死了。你什么都没说。你一直什么都没说。\n\n'
          +'你做了自己的部分。做完了。但没发。你进了会议。但没开麦。你看了所有消息。但没回复。你是这个团队里存在感最低的人——低到最后连成绩单上你的名字都像多余的。\n\n'
          +'你知道你可以做更多。你可以发那个文件。你可以说那句"我做完了"。你可以在小D发火的时候回一句"我理解"。你可以——但你没有。\n\n'
          +'每一次"没有"都让你更安全，也更孤独。你把自己缩成了一个点。一个不占空间的点。你以为这样就不会被伤害——但你也不会被看到了。\n\n'
          +'最让你难过的不是成绩差。是——你做了东西却没有发出去。你有能力，但你的恐惧比你的能力更强大。你被困在了自己的沉默里。\n\n'
          +'也许有一天你会打开麦克风。也许有一天你会按下发送键。但今天不是那一天。今天你只是——又一次看着机会从指缝间漏过去了。'
      }
    }
  };

  // ========== Quadrant-level metadata ==========
  const endingMeta = {
    best: {
      icon: '🌟',
      title: '团魂燃烧',
      comment: '你做到了最难的事——在自己也很艰难的时候，仍然选择了回应别人的需要。这不是圣人行为——这是<strong>真正的合作</strong>。当每个人都愿意说"我不行"，也愿意说"但我可以帮你"的时候，团队就从"名义上的小组"变成了"真正的共同体"。心理学研究反复证明：<strong>心理安全感</strong>是高效团队最重要的特质。你们在这48小时里建立的东西，比任何成绩都更有意义——因为它证明了：一群不完美的人，可以完美地互相托住。'
    },
    pyrrhic: {
      icon: '⚡',
      title: '惨胜',
      comment: '任务完成了，但关系碎了。这就是<strong>"惨胜"</strong>的代价。管理学中有一个概念叫"<strong>关系资本</strong>"（relational capital）——它无法用成绩衡量，但决定了人们是否愿意再次合作。在这48小时里，进度条走到了终点，但士气跌到了谷底。每个人都在问自己同一个问题："值吗？"答案写在那个再也不会响起的群聊里——有些胜利，比失败更让人心寒。'
    },
    honor: {
      icon: '🌈',
      title: '虽败犹荣',
      comment: '你们没有交出一份完美的作业——但你们完成了一件更难的事：<strong>建立了信任</strong>。心理学研究表明，团队的长期绩效取决于成员之间的信任水平，而非单次任务的表现。你们这次的"失败"恰恰为下一次的成功奠定了最重要的基础。因为每个人都知道了：在这个团队里说真话是安全的。被理解的感觉不会因为分数而消失——它会沉淀下来，成为你们之间看不见的桥。'

      icon: '💔',
      title: '全面崩盘',

  const ending = {
    icon: endingMeta[quadrant].icon,
    title: endingMeta[quadrant].title,
    text: endingTexts[quadrant][F?'F':'M'][p],
    comment: endingMeta[quadrant].comment
  };

  // ========== Per-character styles and tips (3 tiers) ==========
  let aCount=choices.filter(c=>c===0).length;

  // Style definitions: per-character, per-tier
  const styleMap = {
    good: { // aCount >= 3
      A: '坦诚型领导者',
      B: '勇敢的求助者',
      C: '知进退的完美主义者',
      D: '柔软的行动派',
      E: '有边界的支持者',
      F: '无声的贡献者'
    },
    mid: { // aCount >= 1
      A: '犹豫的协调者',
      B: '半透明的挣扎者',
      C: '纠结的质量控',
      D: '欲言又止的愤怒者',
      E: '疲惫的好人',
      F: '想被看见的隐形人'
    },
    bad: { // aCount === 0
      A: '缺位的组长',
      B: '消失的成员',
      C: '孤岛的完美主义者',

      E: '透支的讨好者',
      F: '被遗忘的角落'

  // Tip definitions: per-character, per-tier
  const tipMap = {
    good: {
      A: '你在每个关键时刻都选择了坦诚——包括坦诚自己的恐惧。冒名顶替综合症不会因为一次成功就消失，但你今天证明了一件事：不完美的领导者，也可以带出真正的团队。你不需要什么都会——你只需要第一个敢说"我也不确定"。这种勇气，比任何技巧都有力量。',
      B: '你做了最难的事——在所有人面前承认了自己的困境。你以为示弱是一种失败，但事实上它是一种邀请。当你说出"我在打工，我没有时间"的那一刻，你给了其他人说真话的许可。你的勇敢不在于做了多少——而在于你让别人看到了真实的你。',

      E: '你终于开始了那个最重要的练习——说"不"。或者至少，说"我也需要帮助"。你一直以为自己的价值在于帮助别人。但今天你发现：你不帮忙的时候，别人依然在乎你。你的价值不取决于你的有用程度——你本身就值得被珍惜。',
      F: '你开口了。对你来说，这比任何人做的任何事都更勇敢。你打了字没有删掉。你打开了麦克风。你说了"我可以帮忙"。世界没有因此坍塌。没有人嘲笑你。他们回应了你。你这辈子害怕的那件事——被听见——终于发生了。而它是好的。'
    },
    mid: {
      A: '你在一些时刻站了出来，在另一些时刻退缩了。冒名顶替综合症让你在每次做决定之前都要跟自己的恐惧搏斗——这很消耗。但请记住：组长不需要每次都对。你只需要在关键时刻不消失。你做到了一半。下一次，也许可以多半次。',
      B: '你试着开口了，但又缩回去了。你在"说实话"和"藏起来"之间反复横跳。这种拉扯让你比任何人都累。你的挣扎不是因为你不够勇敢——是因为你太久没被允许示弱了。下一次也许可以多走一步：不是"我尽量"，而是"我需要帮忙"。',

      D: '你有时候控制住了脾气，有时候没有。你在道歉和爆发之间摇摆。这不是虚伪——这是一个伤口太深的人在学习新的表达方式。愤怒是你最熟悉的语言，但它不是你唯一的语言。每一次你选择了柔软，都是一次练习。练习够多了，它就会变成本能。',
      E: '你帮了很多人，但也在一些时刻意识到了自己的透支。你开始看到那个模式了——别人一需要帮忙你就无法拒绝。这不是善良，这是恐惧：害怕不被需要。知道这一点很重要。下一步是：偶尔说"这次我不帮"，然后看看天是否会塌。',
      F: '你打了一些字，发了一些出去，也删了很多。你在"被看到"和"藏起来"之间犹豫。这已经是进步了——至少你在犹豫，而不是直接放弃。你的每一次按下发送键，都是在跟恐惧博弈。你赢了一些，输了一些。但你在战斗。这本身就是勇敢。'
    },
    bad: {
      A: '你选择了最安全的路——也是最贵的路。你没有站出来，没有开口，没有承担组长的角色。你以为"不出错"就够了。但在团队里，不作为本身就是一种选择——它告诉别人"没有人在管"。冒名顶替综合症让你相信你不配。但也许真正的问题不是"配不配"——而是你从来没给自己一个机会去试。',
      B: '你消失了。像你一直做的那样。手机关掉，消息不看，假装世界暂停了。但世界没有暂停。别人在做、在吵、在崩溃、在撑着——而你不在。你的缺席不只是"没做作业"——它是对其他五个人说："我不在乎。"你在乎。你只是不知道怎么把"在乎"变成行动。',
      C: '你把自己的部分改了九遍。完美。无可挑剔。但你旁边的人在挣扎、在求助、在需要你——你头都没抬。完美主义在你身上不是追求卓越——它是一种回避。你躲在"做到最好"里面，回避与人合作的不确定、不完美、不可控。你的孤岛很漂亮。但没有人想住在岛上。',
      D: '你把所有人推开了。你的愤怒像一堵墙——它确实保护了你不被看到脆弱的样子。但它也关上了所有人想帮你的门。你不是一个坏人。你是一个受了伤却不知道怎么喊痛的人。下一次——如果你能在最想发火的那一刻停三秒钟，问自己"我真正想说的是什么"——也许一切都会不同。',
      E: '你帮了所有人，忘了自己。又是这样。你的讨好已经不是善良了——它是一种瘾。你需要被需要。你害怕一旦停下来，就会发现自己其实是空的。所以你不停地给、不停地帮、不停地笑——直到你什么都不剩。你的空白文档不是懒惰的证据——它是你自我消耗的证据。你该停下来了。',
      F: '你又一次选择了沉默。选择了安全。选择了不被看到。你做了东西但没发出去。你有话想说但没开口。你的恐惧赢了。但请听我说：沉默不是你的命运。它只是你目前最熟悉的应对方式。也许下一次——哪怕只是一次——你可以在按下删除键之前等三秒钟。三秒钟就够了。'
    }
  };

  let tier = aCount >= 3 ? 'good' : (aCount >= 1 ? 'mid' : 'bad');
  let style = styleMap[tier][p];
  let tip = tipMap[tier][p];

  return {ending,style,tip,quadrant};
}

// --- UI ---
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo({top:0,behavior:'smooth'})}
function appendHTML(html){const d=document.createElement('div');d.innerHTML=html;storyEl.appendChild(d);setTimeout(()=>{try{const rect=d.getBoundingClientRect();const vh=window.innerHeight||document.documentElement.clientHeight;if(rect.top>vh*0.6){window.scrollBy({top:rect.top-vh*0.25,behavior:'smooth'})}else if(rect.top>vh){d.scrollIntoView({behavior:'smooth',block:'center'})}}catch(e){window.scrollBy(0,200)}},150)}
function disableChoices(){document.querySelectorAll('.choice-btn:not(.disabled)').forEach(b=>b.classList.add('disabled'))}

function renderDualBar(){
  const urgent=timeLeft==='02:00:00'||timeLeft==='00:00:00';
  document.getElementById('dual-bar').innerHTML=`
    <div class="countdown ${urgent?'urgent':'normal'}">${timeLeft}</div>
    <div class="dual-tracks">
      <div class="track"><div class="track-label">📊 作业完成度</div><div class="track-bar"><div class="track-fill progress" id="prog-fill" style="width:${progress}%"></div></div><div class="track-val" id="prog-val" style="color:var(--blue)">${progress}%</div></div>
      <div class="track"><div class="track-label">💛 团队士气</div><div class="track-bar"><div class="track-fill morale" id="mor-fill" style="width:${morale}%"></div></div><div class="track-val" id="mor-val" style="color:var(--amber)">${morale}%</div></div>
    </div>`;
}
function updateDual(pd,md){
  progress=Math.max(0,Math.min(100,progress+pd));
  morale=Math.max(0,Math.min(100,morale+md));
  const pf=document.getElementById('prog-fill'),pv=document.getElementById('prog-val');
  const mf=document.getElementById('mor-fill'),mv=document.getElementById('mor-val');
  if(pf)pf.style.width=progress+'%';if(pv)pv.textContent=progress+'%';
  if(mf)mf.style.width=morale+'%';if(mv)mv.textContent=morale+'%';
}

// --- FLOW ---
function startGame(){show('gender-screen')}
function selectGender(g){
  gender=g;const ch=CHARS[g];let html='';
  ['A','B','C','D','E','F'].forEach(k=>{const c=ch[k];html+=`<div class="char-card" onclick="selectChar('${k}')"><div class="char-ava" style="background:${c.color}">${c.name[1]}</div><div class="char-body"><div class="char-name">${c.name}</div><div class="char-trait">${c.trait}</div><div class="char-desc">${c.desc}</div></div></div>`});
  document.getElementById('char-grid').innerHTML=html;show('char-screen');
}
function selectChar(c){
  playerChar=c;progress=25;morale=60;choices=[];currentAct=0;storyEl.innerHTML='';timeLeft=TIMES[0];
  renderDualBar();show('game-screen');showAct(0);
}

function showAct(idx){
  const scenes=getScenes();const act=scenes[idx];currentAct=idx;timeLeft=act.time;renderDualBar();
  let html=`<div class="scene-title">${act.title}</div><div class="time-stamp">${act.stamp}</div>`;
  if(act.chatMsgs){
    html+='<div class="chat-window"><div class="chat-header"><span class="group-name">学习小组 (6)</span></div>';
    act.chatMsgs.forEach(m=>{
      if(m.who==='status'){html+=`<div class="chat-status">${m.text}</div>`;return}
      const c=CHARS[gender][m.who];
      html+=`<div class="chat-msg"><div class="chat-ava" style="background:${c.color}">${c.name[1]}</div><div class="chat-content"><div class="chat-sender">${c.name}</div><div class="chat-bubble">${m.text}</div></div></div>`;
    });
    html+='</div>';
  }
  act.narr.split('\n\n').forEach(l=>{if(l.trim())html+=`<div class="inner-thought">${l}</div>`});
  html+='<div class="choices"><div class="choice-prompt">—— 你 的 选 择 ——</div>';
  act.choices.forEach((c,i)=>{
    html+=`<button class="choice-btn" onclick="actChoose(${idx},${i})">${c.text}</button>`;
  });
  html+='</div>';
  appendHTML(html);
}

function actChoose(actIdx,choiceIdx){
  disableChoices();choices.push(choiceIdx);
  const scenes=getScenes();const act=scenes[actIdx];const c=act.choices[choiceIdx];const fb=act.feedback[choiceIdx];
  updateDual(c.progDelta,c.morDelta);

  let chipHtml='<div class="dual-change">';
  const ps=c.progDelta>0?'+':'';const ms=c.morDelta>0?'+':'';
  chipHtml+=`<span class="dual-chip ${c.progDelta>=0?'prog-up':'prog-down'}">完成度 ${ps}${c.progDelta}%</span>`;
  chipHtml+=`<span class="dual-chip ${c.morDelta>=0?'mor-up':'mor-down'}">士气 ${ms}${c.morDelta}%</span></div>`;

  let html=`<div class="feedback-box">${chipHtml}<div class="feedback-result">${fb.result}</div><div class="analysis-box"><div class="analysis-label">心 理 解 析</div><div class="analysis-text">${fb.analysis}</div></div>`;
  if(actIdx<3){
    html+=`<button class="btn-continue" onclick="showAct(${actIdx+1})">继 续</button>`;
  } else {
    html+=`<button class="btn-continue" onclick="showEnding()">查 看 结 局</button>`;
  }
  html+='</div>';
  appendHTML(html);
}

function showEnding(){
  timeLeft='00:00:00';renderDualBar();
  const {ending,style,tip,quadrant}=getEnding();lastQuadrant=quadrant;const ch=CHARS[gender][playerChar];
  let html=`<div class="ending-icon">${ending.icon}</div><div class="ending-title">${ending.title}</div>`;
  ending.text.split('\n\n').forEach(l=>{if(l.trim())html+=`<div class="ending-text">${l}</div>`});
  html+=`<div class="ending-comment"><div class="ending-comment-label">结 局 评 语</div><div class="ending-comment-text">${ending.comment}</div></div>`;
  html+=`<div class="summary-card"><div class="summary-item"><div class="summary-label">扮演角色</div><div class="summary-value">${ch.name} · ${ch.trait}</div></div>`;
  html+=`<div class="summary-dual"><div class="summary-stat"><div class="summary-stat-label">📊 最终完成度</div><div class="summary-stat-val" style="color:var(--blue)">${progress}%</div></div><div class="summary-stat"><div class="summary-stat-label">💛 最终士气</div><div class="summary-stat-val" style="color:var(--amber)">${morale}%</div></div></div>`;
  html+=`<div class="summary-item"><div class="summary-label">你的协作风格</div><div class="summary-value">${style}</div></div>`;
  html+=`<div class="summary-tip">${tip}</div>`;
  html+=`<div class="reflect-box"><div class="reflect-label">课 后 反 思</div>`;
  html+=`<div class="reflect-q">在你的真实小组合作经历中，你更倾向于"催进度"还是"维持关系"？你觉得这两者真的不可兼得吗？</div>`;
  html+=`<div class="reflect-q">小组里总有人做得多、有人做得少。当你发现有人"搭便车"时，你通常会怎么做？你选择的方式，解决了问题还是回避了问题？</div>`;
  html+=`<div class="reflect-q">如果你是这个小组的组长，在任务开始的第一天你会做什么不同的事，来避免最后48小时的混乱？</div>`;
  html+=`<div class="reflect-hint">这些问题没有标准答案。可以写在纸上，也可以带到课堂讨论中。</div></div>`;
  const archiveCode=generateArchiveCode();
  saveGameRecord('E2',archiveCode,ending.title,ending.icon,archiveCode.split('-').pop());
  html+=`<div class="archive-section"><div class="archive-label">存 档 码</div><div class="archive-code" id="archive-code">${archiveCode}</div><button class="btn-copy" id="copy-btn" onclick="copyCode()">复制存档码</button><div class="archive-hint">保存此代码，可记录你的协作风格与结局</div></div>`;
  html+=`<button class="btn-restart" onclick="restartGame()">重 新 开 始</button><br><a href="index.html" class="btn-back">返回事件选择</a></div>`;
  appendHTML(html);
  document.getElementById('dual-bar').style.display='none';
}

function generateArchiveCode(){
  const g=gender==='F'?'F':'M';
  const qKeys={best:'BST',pyrrhic:'PYR',honor:'HNR',collapse:'CLP'};
  const eCode=qKeys[lastQuadrant]||'UNK';
  return `E2-${g}${playerChar}-${choices.join('')}-${eCode}`;
}
function copyCode(){
  const code=document.getElementById('archive-code').textContent;
  const btn=document.getElementById('copy-btn');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(code).then(()=>{btn.textContent='已复制';btn.classList.add('copied');setTimeout(()=>{btn.textContent='复制存档码';btn.classList.remove('copied')},2000)}).catch(()=>fallbackCopy(code,btn));
  }else{fallbackCopy(code,btn)}
}
function fallbackCopy(text,btn){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');btn.textContent='已复制';btn.classList.add('copied');setTimeout(()=>{btn.textContent='复制存档码';btn.classList.remove('copied')},2000)}catch(e){btn.textContent='请手动复制'}
  document.body.removeChild(ta);
}

function restartGame(){
  progress=25;morale=60;choices=[];currentAct=0;storyEl.innerHTML='';timeLeft='48:00:00';
  document.getElementById('dual-bar').style.display='';
  show('title-screen');
}
</script>
