<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>独处的那一夜 · 大学心理事件簿</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1e2e;--bg2:#222840;
  --card:rgba(30,35,55,0.85);--card-hover:rgba(40,48,75,0.95);
  --blue:#4a6fa5;--blue-light:#6a8fc5;--blue-dim:rgba(74,111,165,0.12);
  --amber:#c49a6c;--amber-light:#d4b08c;--amber-dim:rgba(196,154,108,0.12);
  --red:#b05050;--red-light:#c87070;--red-dim:rgba(176,80,80,0.12);
  --green:#6a9a70;
  --ink:#d8dce8;--ink2:#a0a8c0;--ink3:#7a82a0;--ink4:#505870;
  --font-body:Georgia,'Songti SC','SimSun',serif;
  --font-ui:system-ui,'PingFang SC','Microsoft YaHei',sans-serif;
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 500px 400px at 25% 20%,rgba(74,111,165,0.1),transparent 70%),
    radial-gradient(ellipse 400px 400px at 75% 70%,rgba(196,154,108,0.06),transparent 70%),
    radial-gradient(ellipse 300px 300px at 50% 50%,rgba(176,80,80,0.04),transparent 70%)}
#app{position:relative;z-index:1;max-width:520px;margin:0 auto;min-height:100vh;padding:0 20px}
.screen{display:none;opacity:0}.screen.active{display:block;animation:fadeUp 0.8s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ===== TITLE SCREEN ===== */
#title-screen{text-align:center}
#title-screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;animation:fadeUp 1s ease forwards}
.title-icon{width:80px;height:80px;margin-bottom:28px;border-radius:50%;border:2px solid var(--blue-light);display:flex;align-items:center;justify-content:center;font-size:1.6rem;animation:iconPulse 3s ease-in-out infinite}
@keyframes iconPulse{0%,100%{box-shadow:0 0 20px rgba(74,111,165,0.15)}50%{box-shadow:0 0 40px rgba(74,111,165,0.3)}}
.title-main{font-size:1.8rem;font-weight:700;letter-spacing:0.1em;color:var(--ink);margin-bottom:6px}
.title-sub{font-size:0.82rem;color:var(--ink3);letter-spacing:0.25em;margin-bottom:40px}
.btn-start{background:transparent;border:1px solid var(--blue-light);color:var(--blue-light);padding:14px 44px;font-size:0.9rem;letter-spacing:0.2em;cursor:pointer;border-radius:1px;transition:all 0.3s;font-family:var(--font-body)}
.btn-start:hover{background:var(--blue-dim);box-shadow:0 0 30px rgba(74,111,165,0.15)}

/* ===== GENDER SCREEN ===== */
#gender-screen{display:none;opacity:0;min-height:100vh;text-align:center}
#gender-screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;animation:fadeUp 0.6s ease forwards}
.sel-heading{font-size:1.05rem;color:var(--ink);margin-bottom:6px}
.sel-sub{font-size:0.78rem;color:var(--ink3);margin-bottom:28px;letter-spacing:0.1em}
.gender-grid{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.gender-card{width:140px;background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:22px 16px;cursor:pointer;transition:all 0.3s;text-align:center}
.gender-card:hover{background:var(--card-hover);border-color:var(--blue-light);transform:translateY(-3px);box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.gender-icon{font-size:2rem;margin-bottom:8px}
.gender-label{font-size:0.9rem;font-weight:600;color:var(--ink);margin-bottom:4px}
.gender-desc{font-size:0.72rem;color:var(--ink2);line-height:1.5}

/* ===== VALUE BAR ===== */
.value-bar{position:sticky;top:0;z-index:100;padding:12px 0 10px;background:linear-gradient(to bottom,var(--bg) 70%,transparent)}
.value-bar-inner{border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:10px 12px;background:rgba(25,30,48,0.9);backdrop-filter:blur(8px)}
.time-tag{text-align:center;font-size:0.72rem;letter-spacing:0.15em;margin-bottom:8px;padding:3px 0;border-radius:3px;font-weight:600;color:var(--blue-light);background:rgba(74,111,165,0.1);font-family:var(--font-ui)}
.value-grid{display:flex;flex-direction:column;gap:5px}
.value-item{display:flex;align-items:center;gap:6px}
.value-name{font-size:0.62rem;color:var(--ink3);width:56px;flex-shrink:0;letter-spacing:0.05em}
.value-track{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,0.06);overflow:hidden}
.value-fill{height:100%;border-radius:2px;transition:width 0.8s cubic-bezier(0.34,1.56,0.64,1)}
.value-fill.anxiety{background:var(--red)}
.value-fill.energy{background:var(--blue)}
.value-fill.efficacy{background:var(--amber)}
.value-num{font-size:0.58rem;color:var(--ink3);width:22px;text-align:right;font-variant-numeric:tabular-nums;font-family:var(--font-ui)}

/* ===== NARRATIVE ===== */
.time-label{display:inline-block;font-size:0.72rem;letter-spacing:0.2em;padding:4px 14px;border-radius:3px;margin:28px 0 10px;background:var(--blue-dim);border:1px solid rgba(74,111,165,0.2);color:var(--blue-light);font-family:var(--font-ui)}
.time-label.late{background:var(--amber-dim);border-color:rgba(196,154,108,0.2);color:var(--amber)}
.time-label.dawn{background:rgba(196,154,108,0.15);border-color:rgba(196,154,108,0.3);color:var(--amber-light)}
.scene-narr{font-size:0.85rem;line-height:1.9;color:var(--ink2);margin:14px 0;padding-left:14px;border-left:2px solid rgba(74,111,165,0.2)}
.inner-mono{font-size:0.82rem;line-height:1.8;color:var(--ink3);font-style:italic;margin:10px 0;padding:10px 14px;background:rgba(255,255,255,0.02);border-radius:6px}
.inner-mono span{display:block;margin:4px 0;opacity:0;animation:monoIn 0.5s ease forwards}
.inner-mono span:nth-child(2){animation-delay:0.6s}
.inner-mono span:nth-child(3){animation-delay:1.2s}
.inner-mono span:nth-child(4){animation-delay:1.8s}
@keyframes monoIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ===== PHONE MESSAGE ===== */
.phone-msg{margin:14px 0;padding:12px;background:rgba(255,255,255,0.03);border-radius:10px;border:1px solid rgba(255,255,255,0.05)}
.phone-msg-from{font-size:0.65rem;color:var(--ink3);margin-bottom:6px;letter-spacing:0.08em}
.phone-msg-text{font-size:0.84rem;line-height:1.6;color:var(--ink)}
.phone-msg-time{font-size:0.6rem;color:var(--ink4);margin-top:4px;text-align:right}

/* ===== CHOICES ===== */
.choices{margin:18px 0}
.choice-prompt{font-size:0.72rem;letter-spacing:0.2em;margin-bottom:10px;color:var(--blue-light)}
.choice-btn{display:block;width:100%;background:var(--card);border:1px solid rgba(255,255,255,0.05);border-radius:8px;padding:14px 16px;margin-bottom:8px;text-align:left;color:var(--ink);font-size:0.84rem;line-height:1.7;cursor:pointer;transition:all 0.25s;font-family:var(--font-body);position:relative}
.choice-btn:hover{background:var(--card-hover);border-color:var(--blue-light);transform:translateX(4px);box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.choice-btn.disabled{opacity:0.2;pointer-events:none}

/* ===== FEEDBACK ===== */
.feedback-box{margin:14px 0;animation:feedIn 0.4s ease}
@keyframes feedIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.feedback-result{background:var(--card);border-radius:8px;padding:12px 14px;font-size:0.84rem;line-height:1.8;color:var(--ink);margin-bottom:8px;border-left:3px solid var(--blue-light)}
.value-change{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.value-chip{font-size:0.7rem;padding:3px 8px;border-radius:3px;font-weight:600}
.value-chip.up{background:rgba(106,154,112,0.15);color:var(--green)}
.value-chip.down{background:rgba(176,80,80,0.15);color:var(--red-light)}
.analysis-box{background:linear-gradient(135deg,rgba(74,111,165,0.08),rgba(196,154,108,0.05));border:1px solid rgba(74,111,165,0.12);border-radius:8px;padding:12px 14px;margin:8px 0 16px}
.analysis-label{font-size:0.62rem;letter-spacing:0.2em;color:var(--blue-light);margin-bottom:5px}
.analysis-text{font-size:0.78rem;line-height:1.8;color:var(--ink2)}
.reflect-box{margin:20px 0;padding:18px;border-radius:8px;background:linear-gradient(135deg,rgba(74,111,165,0.04),rgba(196,154,108,0.03));border:1px solid rgba(74,111,165,0.18)}
.reflect-label{font-size:0.65rem;letter-spacing:0.25em;color:var(--blue-light);margin-bottom:10px;font-weight:600}
.reflect-q{font-size:0.78rem;line-height:1.85;color:var(--ink2);margin:10px 0;padding-left:14px;border-left:2px solid rgba(74,111,165,0.3)}
.reflect-hint{font-size:0.68rem;color:var(--ink3);margin-top:12px;font-style:italic}
.btn-continue{display:block;margin:18px auto;background:transparent;border:1px solid rgba(255,255,255,0.08);color:var(--ink3);padding:10px 30px;font-size:0.8rem;cursor:pointer;border-radius:3px;transition:all 0.3s;font-family:var(--font-body);letter-spacing:0.15em}
.btn-continue:hover{border-color:var(--blue-light);color:var(--blue-light)}

/* ===== MIDNIGHT DIVIDER ===== */
.midnight-divider{text-align:center;margin:30px 0;padding:18px;position:relative}
.midnight-divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(74,111,165,0.3),transparent)}
.midnight-text{position:relative;display:inline-block;background:var(--bg);padding:0 16px;font-size:0.68rem;letter-spacing:0.3em;color:var(--ink4)}

/* ===== ENDINGS ===== */
.exam-prediction{background:linear-gradient(135deg,rgba(176,80,80,0.08),rgba(196,154,108,0.06));border:1px solid rgba(176,80,80,0.2);border-radius:8px;padding:16px 18px;margin:20px 0}
.exam-prediction-label{font-size:0.62rem;color:var(--red-light);letter-spacing:0.2em;margin-bottom:8px;font-weight:600}
.exam-prediction-title{font-size:0.92rem;color:var(--ink);font-weight:700;margin-bottom:8px}
.exam-prediction-text{font-size:0.8rem;line-height:1.85;color:var(--ink2)}
.ending-card{border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:24px 18px 20px;margin:24px 0 0;text-align:center;background:linear-gradient(180deg,rgba(30,35,55,0.9),rgba(30,35,55,0.6))}
.ending-icon{font-size:2.8rem;text-align:center;margin:0 0 12px}
.ending-title{font-size:1.3rem;text-align:center;color:var(--ink);margin-bottom:6px;font-weight:700}
.ending-sub{font-size:0.82rem;color:var(--ink3);text-align:center;line-height:1.6}
.ending-text{font-size:0.86rem;line-height:2;color:var(--ink2);margin:16px 0}
.ending-comment{background:linear-gradient(135deg,rgba(74,111,165,0.08),rgba(196,154,108,0.06));border:1px solid rgba(74,111,165,0.15);border-radius:8px;padding:16px;margin:18px 0}
.ending-comment-label{font-size:0.62rem;color:var(--blue-light);letter-spacing:0.2em;margin-bottom:6px}
.ending-comment-text{font-size:0.8rem;line-height:1.85;color:var(--ink2)}
.summary-card{background:var(--card);border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:20px;margin:20px 0;text-align:center}
.summary-title{font-size:0.72rem;color:var(--blue-light);letter-spacing:0.25em;margin-bottom:14px;text-transform:uppercase}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.summary-row:last-of-type{border-bottom:none}
.summary-item{margin:12px 0}
.summary-label{font-size:0.68rem;color:var(--ink3);letter-spacing:0.12em;margin-bottom:3px}
.summary-value{font-size:0.95rem;color:var(--ink);font-weight:600}
.summary-values{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}
.summary-val-item{background:rgba(255,255,255,0.03);padding:8px 10px;border-radius:4px;text-align:left}
.summary-val-name{font-size:0.68rem;color:var(--ink3)}
.summary-val-num{font-size:0.9rem;font-weight:600;color:var(--ink)}
.summary-tip{font-size:0.78rem;color:var(--ink2);line-height:1.8;text-align:left;margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.05)}
.btn-restart{display:inline-block;margin-top:18px;background:var(--blue-dim);border:1px solid rgba(74,111,165,0.3);color:var(--blue-light);padding:10px 34px;font-size:0.85rem;cursor:pointer;border-radius:3px;transition:all 0.3s;font-family:var(--font-body);letter-spacing:0.15em}
.btn-restart:hover{background:rgba(74,111,165,0.2)}
.btn-back{display:inline-block;margin-top:10px;background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--ink4);padding:9px 28px;font-size:0.78rem;cursor:pointer;border-radius:3px;transition:all 0.3s;font-family:var(--font-body);text-decoration:none}
.btn-back:hover{border-color:var(--blue-light);color:var(--blue-light)}
.archive-section{margin:18px 0;padding:16px;background:linear-gradient(135deg,rgba(74,111,165,0.06),rgba(196,154,108,0.04));border:1px dashed rgba(74,111,165,0.3);border-radius:8px;text-align:center}
.archive-label{font-size:0.62rem;color:var(--blue-light);letter-spacing:0.25em;margin-bottom:8px}
.archive-code{font-family:var(--font-ui);font-size:0.82rem;color:var(--ink);background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:4px;padding:10px 14px;margin:6px 0 10px;letter-spacing:0.08em;word-break:break-all;user-select:all}
.btn-copy{background:var(--blue-dim);border:1px solid rgba(74,111,165,0.3);color:var(--blue-light);padding:7px 20px;font-size:0.75rem;cursor:pointer;border-radius:3px;transition:all 0.3s;font-family:var(--font-body);letter-spacing:0.1em}
.btn-copy:hover{background:rgba(74,111,165,0.2)}
.archive-hint{font-size:0.62rem;color:var(--ink4);margin-top:8px}
.scroll-anchor{height:1px}

/* ===== MEANING FLASH (hidden ending scene) ===== */
.meaning-divider{text-align:center;margin:30px 0 20px;padding:18px;position:relative}
.meaning-divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(196,154,108,0.4),transparent)}
.meaning-text{position:relative;display:inline-block;background:var(--bg);padding:0 16px;font-size:0.68rem;letter-spacing:0.3em;color:var(--amber)}
.meaning-scene{margin:16px 0;padding:14px 16px;border-left:2px solid rgba(196,154,108,0.35);font-size:0.85rem;line-height:1.9;color:var(--ink2);background:linear-gradient(135deg,rgba(196,154,108,0.04),transparent)}
.meaning-question{margin:16px 0;padding:16px;border-radius:8px;text-align:center;font-size:0.9rem;line-height:1.8;color:var(--amber-light);background:rgba(196,154,108,0.08);border:1px solid rgba(196,154,108,0.15)}
/* === MY RECORDS === */
.my-records-block{width:100%;max-width:380px;margin:0 auto 20px}
.my-records-toggle{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;cursor:pointer;background:rgba(74,111,165,0.06);border:1px solid rgba(74,111,165,0.12);border-radius:8px;transition:all 0.3s;user-select:none}
.my-records-toggle:hover{background:rgba(74,111,165,0.1)}
.my-records-label{font-size:0.75rem;letter-spacing:0.1em;color:inherit;opacity:0.6}
.my-records-arrow{font-size:0.7rem;opacity:0.4;transition:transform 0.3s}
.my-records-block.expanded .my-records-arrow{transform:rotate(180deg)}
.my-records-list{max-height:0;overflow:hidden;transition:max-height 0.4s ease,opacity 0.3s ease;opacity:0}
.my-records-block.expanded .my-records-list{max-height:600px;opacity:1;margin-top:8px}
.my-record-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;margin-bottom:4px;background:rgba(74,111,165,0.04);border:1px solid rgba(74,111,165,0.06);border-radius:6px;transition:background 0.2s}
.my-record-item:hover{background:rgba(74,111,165,0.08)}
.my-record-icon{font-size:1.1rem;flex-shrink:0;margin-top:2px}
.my-record-info{flex:1;min-width:0}
.my-record-title{font-size:0.78rem;font-weight:600;line-height:1.4;color:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.my-record-meta{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.my-record-code{font-family:'Courier New',monospace;font-size:0.65rem;opacity:0.5;letter-spacing:0.03em}
.my-record-date{font-size:0.62rem;opacity:0.4}
@media(max-width:540px){
  #app{padding:0 16px}
  .title-main{font-size:1.5rem}
}
</style>
</head>
<body>
<div id="app">
  <div id="title-screen" class="screen active">
    <div class="title-icon">🌙</div>
    <div class="title-main">独处的那一夜</div>
    <div class="title-sub">大学 · 心理事件簿</div>
    <button class="btn-start" onclick="startGame()">开 始 故 事</button>
  </div>
  <div id="gender-screen" class="screen">
    <div class="sel-heading">选择性别</div>
    <div class="sel-sub">不影响剧情，仅用于叙述称谓</div>
    <div class="gender-grid">
      <div class="gender-card" onclick="selectGender('M')"><div class="gender-icon">🧑</div><div class="gender-label">男生</div><div class="gender-desc">他 / 他的</div></div>
      <div class="gender-card" onclick="selectGender('F')"><div class="gender-icon">👩</div><div class="gender-label">女生</div><div class="gender-desc">她 / 她的</div></div>
    </div>
  </div>
  <div id="game-screen" class="screen">
    <div class="value-bar" id="value-bar"></div>
    <div id="story"></div>
  </div>
</div>

<script>
/* === RECORD STORAGE === */
function saveGameRecord(eid,code,title,icon,ec){try{var a=JSON.parse(localStorage.getItem('psych_game_records')||'{}');if(!a[eid])a[eid]=[];a[eid].unshift({code:code,title:title,icon:icon,endingCode:ec,ts:Date.now()});if(a[eid].length>20)a[eid]=a[eid].slice(0,20);localStorage.setItem('psych_game_records',JSON.stringify(a));}catch(e){}}
function getGameRecords(eid){try{var a=JSON.parse(localStorage.getItem('psych_game_records')||'{}');return a[eid]||[];}catch(e){return[];}}
function renderRecordsBlock(eid){var recs=getGameRecords(eid);if(!recs.length)return;var ts=document.getElementById('title-screen');if(!ts)return;var btn=ts.querySelector('.btn-start');if(!btn)return;var b=document.createElement('div');b.className='my-records-block';b.innerHTML='<div class="my-records-toggle" onclick="this.parentElement.classList.toggle(\'expanded\')"><span class="my-records-label">\uD83D\uDCCB 我的记录 ('+recs.length+')</span><span class="my-records-arrow">\u25BE</span></div><div class="my-records-list">'+recs.map(function(r){var d=new Date(r.ts);var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');return '<div class="my-record-item"><span class="my-record-icon">'+r.icon+'</span><div class="my-record-info"><div class="my-record-title">'+r.title+'</div><div class="my-record-meta"><span class="my-record-code">'+r.code+'</span><span class="my-record-date">'+ds+'</span></div></div></div>';}).join('')+'</div>';ts.insertBefore(b,btn);}
renderRecordsBlock('E5');
/* ===== STATE ===== */
let gender='M';
let choices=[];
let anxiety=65,energy=60,efficacy=55;
let act=0;
let wentOut=false;
let currentTime='19:00';
const storyEl=document.getElementById('story');

const timeLabels={
  '19:00':'晚上 7:00','20:00':'晚上 8:00','21:00':'晚上 9:00','22:00':'晚上 10:00',
  '00:00':'凌晨 0:00','02:00':'凌晨 2:00','03:00':'凌晨 3:00','04:00':'凌晨 4:00','04:50':'凌晨 4:50','05:00':'凌晨 5:00'
};

/* ===== HELPERS ===== */
function HE(){return gender==='F'?'她':'他'}
function HIS(){return gender==='F'?'她的':'他的'}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');s.style.display='none'});
  const el=document.getElementById(id);
  el.style.display='';void el.offsetWidth;el.classList.add('active');
}
function startGame(){showScreen('gender-screen')}
function selectGender(g){
  gender=g;anxiety=65;energy=60;efficacy=55;
  choices=[];wentOut=false;act=0;currentTime='19:00';
  storyEl.innerHTML='';
  showScreen('game-screen');
  renderValueBar();
  showPrologue();
  requestAnimationFrame(()=>window.scrollTo({top:0,behavior:'instant'}));
}

function clamp(v){return Math.max(0,Math.min(100,Math.round(v)))}
function applyDeltas(d){
  if(d.anx) anxiety+=d.anx;
  if(d.eng) energy+=d.eng;
  if(d.eff) efficacy+=d.eff;
  anxiety=clamp(anxiety);energy=clamp(energy);efficacy=clamp(efficacy);
  renderValueBar();
}

function renderValueBar(){
  const vb=document.getElementById('value-bar');
  vb.innerHTML=`<div class="value-bar-inner">
    <div class="time-tag">${timeLabels[currentTime]||currentTime}</div>
    <div class="value-grid">
      <div class="value-item"><span class="value-name">焦虑值</span><div class="value-track"><div class="value-fill anxiety" style="width:${clamp(anxiety)}%"></div></div><span class="value-num">${clamp(anxiety)}</span></div>
      <div class="value-item"><span class="value-name">精力值</span><div class="value-track"><div class="value-fill energy" style="width:${clamp(energy)}%"></div></div><span class="value-num">${clamp(energy)}</span></div>
      <div class="value-item"><span class="value-name">自我效能</span><div class="value-track"><div class="value-fill efficacy" style="width:${clamp(efficacy)}%"></div></div><span class="value-num">${clamp(efficacy)}</span></div>
    </div>
  </div>`;
}

function appendHTML(html){
  const div=document.createElement('div');
  div.innerHTML=html;
  storyEl.appendChild(div);
  requestAnimationFrame(()=>div.scrollIntoView({behavior:'smooth',block:'start'}));
}
function disableChoices(){
  document.querySelectorAll('.choice-btn:not(.disabled)').forEach(b=>b.classList.add('disabled'));
}
function renderValueChips(d){
  const labels={anx:'焦虑值',eng:'精力值',eff:'自我效能'};
  let html='<div class="value-change">';
  for(const k of ['anx','eng','eff']){
    if(d[k]&&d[k]!==0){
      const cls=k==='anx'?(d[k]>0?'down':'up'):(d[k]>0?'up':'down');
      const sign=d[k]>0?'+':'';
      html+=`<span class="value-chip ${cls}">${labels[k]} ${sign}${d[k]}</span>`;
    }
  }
  return html+'</div>';
}

function act1Choose(idx){

  const texts=[
    {narr:gender==='F'?`你趴在桌上，眼泪无声地流了下来。你也说不清自己在哭什么——是考试，是压力，是孤独，还是三者都有。哭了大概五分钟，你用袖子擦了擦眼睛，吸了吸鼻子。奇怪的是，心里好像轻了一点。`:`你趴在桌上，把脸埋进手臂里，什么都不想。脑子里嗡嗡作响的焦虑声渐渐安静了一些。大概过了五分钟，你抬起头，深深吸了一口气，又慢慢吐出来。奇怪的是，心里好像轻了一点。`,analysis:gender==='F'?`哭泣是人体自带的压力释放机制。眼泪中含有压力荷尔蒙，哭泣能直接降低皮质醇水平。"忍住不哭"看似坚强，但情绪压抑会消耗额外的认知资源——有时候，允许自己脆弱，才是真正的坚强。`:`暂时的"放空"是一种有效的情绪调节策略。当大脑持续处于高压运转状态时，主动按下暂停键能让皮质醇水平自然回落。"扛着不停"看似坚强，但情绪压抑会消耗额外的认知资源——有时候，允许自己停一停，才是真正的坚强。`},
    {narr:`你灌下一杯速溶咖啡，苦涩的味道让你皱了皱眉。十分钟后，咖啡因开始生效——困意暂时退去，大脑像被强行开了机。但你的心跳也加快了，手微微发抖。你知道这不是精力恢复——这是在透支。`,analysis:`咖啡因阻断腺苷受体来延缓困意，但并不真正恢复精力——它只是在"借明天的精神来用"。过量咖啡因还会加重焦虑症状（心悸、手抖、注意力过度集中），这就是为什么很多人越喝咖啡越焦虑。`},
    {narr:`你设了20分钟的闹钟，躺到床上。闭上眼的瞬间，身体像被卸掉了所有重量。闹钟响的时候，你差点按掉——但最终还是坐了起来。短暂的休息让你的大脑重启了一部分。虽然还是困，但至少能思考了。`,analysis:`"战略性小憩"是高效学习者的秘密武器。20分钟刚好够让大脑进入浅睡眠并恢复部分功能，又不至于进入深度睡眠导致起来后更困。关键是：设了闹钟就要起来，否则20分钟会变成2小时。`}

    html+=`<div class="meaning-scene">你打开窗，凌晨的风灌进来，带着一股潮湿的土腥气。楼下的路灯还亮着，灯光里有飞蛾在绕圈——它们不知疲倦地扑向光源，一遍又一遍。</div>`;
    html+=`<div class="meaning-scene">你看着那些飞蛾，突然想到一个问题——</div>`;

    html+=`<div class="meaning-scene">有些东西比成绩更重要。你说不清那是什么。但它确实在那里——在你选择面对过去的时候，在你对自己说"你已经很努力了"的时候，在你没有逃跑的每一个瞬间里。</div>`;
    html+=`<div class="meaning-scene">风吹过来，你打了个寒颤。但心里有什么东西，暖了一下。很微弱，像远处那道灰蓝色的光——但它在那里。</div>`;
    html+=`<div class="meaning-scene" style="border-left-color:rgba(232,193,112,0.5)">你回到书桌前，没有继续看书。你拿起笔，在笔记本的空白页上写了一行字：<br><br><b style="color:var(--amber-light);letter-spacing:0.1em">"我在这里。这就是意义。"</b></div>`;
  }
  html+=`<div class="scene-narr">这一夜，就这样过去了。所有的选择都已经做出，所有的路都已经走过。</div>`;
  html+=`<button class="btn-continue" onclick="showEnding()">看看这一夜的结局 ——</button>`;
  html+=`<div class="scroll-anchor"></div>`;
  appendHTML(html);
}

/* ═══════════════ Ending System ═══════════════ */
function countPositiveChoices(){
  let count=0;
  /* Prologue idx=1: honest reply */
  if(choices[0]===1) count++;
  /* Act1 idx=0 or 1: tackle hard or do easy (both proactive) */
  if(choices[1]===0||choices[1]===1) count++;
  /* Act2 idx=0 or 1: decline politely or go recharge */
  if(choices[2]===0||choices[2]===1) count++;
  /* Act3 idx=0 or 1: adjust strategy or set small goal */
  if(choices[3]===0||choices[3]===1) count++;
  /* Act4 idx=0 or 2: emotional release or strategic nap */
  if(choices[4]===0||choices[4]===2) count++;
  /* Act5 idx=0: face the past (required for MNG, also positive) */
  if(choices[5]===0) count++;
  /* Act6 idx=0 or 1: walk/water or wash face/stretch */
  if(choices[6]===0||choices[6]===1) count++;
  /* Act7 idx=0: self-compassion (required for MNG, also positive) */
  if(choices[7]===0) count++;
  /* Act8 idx=0 or 1: strategic sleep or push through */
  if(choices.length>8&&(choices[8]===0||choices[8]===1)) count++;
  return count;
}

function isMeaningEnding(){
  return choices[5]===0 && choices[7]===0 && countPositiveChoices()>=4;
}

function getEnding(){
  const a=anxiety,e=energy,s=efficacy;
  /* Hidden ending: highest priority */
  if(isMeaningEnding()) return{title:'觉醒 · 意义之光',sub:'在最深的夜里，你看见了自己为什么要走下去',icon:'✨',color:'#e8c170',code:'MNG'};
  if(s>=80) return{title:'觉醒',sub:'你在黑夜里找到了自己的声音',icon:'🌟',color:'#c49a6c',code:'AWK'};
  if(a>=80&&e<=10&&s<=30) return{title:'崩溃',sub:'有时候，倒下也是一种信号',icon:'🌑',color:'#5a4a6a',code:'BRK'};
  if(a>=75&&s<60) return{title:'过度焦虑',sub:'焦虑吞噬了整个夜晚，你被困在恐惧的回音室里',icon:'🌀',color:'#b05050',code:'OVR'};
  if(a>=60&&e<=20&&s>=40) return{title:'硬撑',sub:'你熬过来了，但代价不小',icon:'🕯️',color:'#7a8b9a',code:'GRT'};
  if(a<=40&&e>=30&&s>=70) return{title:'破晓',sub:'天亮了，你还在，比昨天更完整',icon:'🌅',color:'#e8a87c',code:'DAY'};
  if(a<=40&&e>=60&&s<=45) return{title:'逃避',sub:'你避开了焦虑，但也避开了成长',icon:'🫧',color:'#6a9a8a',code:'ESC'};
  return{title:'未完待续',sub:'这一夜只是开始，故事还在继续',icon:'📖',color:'#8a8a8a',code:'TBC'};
}

function showEnding(){
  const ending=getEnding();
  /* clear story and scroll to top */
  storyEl.innerHTML='';
  window.scrollTo({top:0,behavior:'instant'});
  /* coping style */
  let style='混合型';
  if(ending.code==='MNG') style='意义探索型';
  else if(anxiety>=75&&efficacy<60) style='过度焦虑型';
  else if(anxiety>=70&&energy<=25) style='硬撑型';
  else if(anxiety<=35&&efficacy<=40) style='回避型';
  else if(efficacy>=65&&anxiety<=50) style='自我调节型';

  /* per-ending narrative */
  let narr='';
  if(ending.code==='AWK'){
    narr=`<div class="scene-narr">天亮了。你坐在窗边，看着晨光一寸一寸地爬上对面的教学楼。<br><br>这一夜，你没有看完所有的书。你没有变成一个"准备充分"的考生。但你做了一件更重要的事——你在焦虑的暴风眼里，找到了一个安静的自己。</div>`;
    narr+=`<div class="scene-narr">你开始意识到一些以前从未想清楚的东西：焦虑不是你的敌人，它只是一个信号，在告诉你"这件事对你很重要"。疲惫也不是软弱，它是身体在设置边界。而真正让你感到踏实的，不是"我把书全看完了"——而是"我知道自己在做什么，也知道自己为什么这么做"。</div>`;
    narr+=`<div class="scene-narr">你拿起手机，给妈妈发了一条消息："没复习完，但我心里有数了。"<br><br>发完之后，你长长地呼出一口气。窗外的鸟叫声越来越密。你站起来，伸了个懒腰。不管下午的考试结果如何——你今晚学到的东西，比课本上的多得多。</div>`;
  }else if(ending.code==='MNG'){
    narr=`<div class="scene-narr">天亮了。但不是突然亮的——是一点一点、一层一层地亮起来的。</div>`;
    narr+=`<div class="scene-narr">你坐在窗边，看着天际线从灰蓝变成浅粉，再变成淡金色。远处的教学楼像被人慢慢调高了亮度，轮廓一点一点从黑暗中浮现出来。楼下的梧桐树叶开始反光，鸟叫声从一只变成一群。</div>`;
    narr+=`<div class="scene-narr">你低头看了看笔记本上那行字——<b>"我在这里。这就是意义。"</b><br><br>写下它的时候，你并不完全理解它的意思。但现在，看着窗外渐渐醒来的世界，你好像有一点懂了。</div>`;
    narr+=`<div class="scene-narr">这一夜，你没有看完所有的书。你没有把五章内容全部吃透。从"备考效率"的角度看，你的表现算不上优秀。但你做了一些别的事情——你面对了过去的失败，没有被它打倒。你听见了内心自我攻击的声音，选择了另一个声音。你在身体说"不行了"的时候，没有强撑，而是照顾了自己。</div>`;
    narr+=`<div class="scene-narr">这些事情，没有一件会出现在考卷上。但它们比任何一道题都重要。</div>`;
    narr+=`<div class="scene-narr">你拿起手机，给妈妈发了一条消息。不是"还行"，不是"别担心"——你打的是：<br><br><b>"妈，我昨晚想了很多。不只是关于考试。我觉得我比以前更了解自己了。"</b><br><br>发完之后你没有等回复。你把手机放下，走到阳台上。晨风吹过来，带着草地和露水的味道。远处有人在操场上跑步，脚步声在空旷的校园里回荡。</div>`;
    narr+=`<div class="scene-narr">你深吸一口气，感觉空气从鼻腔一直流到肺的最底部。你的身体很疲惫——但你的内心，有一种从未有过的安定感。不是"我准备好了"的自信，而是"不管发生什么，我都在这里"的踏实。</div>`;
    narr+=`<div class="scene-narr" style="border-left-color:rgba(232,193,112,0.4)">你想起了昨晚窗外的飞蛾。它们不知道自己为什么飞向光。但它们飞了。<br><br>也许意义不是一个答案。也许意义就是——你在寻找的这个过程本身。你愿意在深夜里坐下来，面对自己，面对恐惧，面对那些说不清的东西。<br><br>你愿意留在这里。<br><br><b style="color:var(--amber-light)">这就够了。</b></div>`;
  }else if(ending.code==='DAY'){
    narr=`<div class="scene-narr">天亮了。橙红色的晨光穿过窗帘缝隙，在桌面上画出一道暖色的线。你看着这道光，突然觉得——自己居然撑过来了。</div>`;
    narr+=`<div class="scene-narr">这一夜并不完美。你有过焦虑到想摔书的瞬间，有过困到眼泪自己往下掉的时刻，也有过"算了不考了"的念头在脑子里一闪而过。但每一次，你都做了一个选择——不是最完美的选择，但是一个让自己能继续走下去的选择。</div>`;

    narr+=`<div class="scene-narr">你打了个哈欠，决定去食堂吃个早饭。推开门的时候，走廊里的晨光铺了一地。你踩在光里，觉得脚下是踏实的。<br><br>天亮了，你还在。这就够了。</div>`;
  }else if(ending.code==='GRT'){
    narr=`<div class="scene-narr">天亮了。你还坐在书桌前——或者说，你瘫在书桌前。</div>`;

    narr+=`<div class="scene-narr">只是……你的身体在替你喊停了。站起来的时候，眼前一黑，你扶着桌沿站了好几秒才缓过来。你知道，以这个状态去考试，发挥不会太好。<br><br>你赢了这一夜的坚持，但输了明天的状态。这笔账，值不值得？也许只有你自己知道。</div>`;

    narr+=`<div class="scene-narr">你试着坐起来，发现全身都在发抖。不是冷——是那种从内部涌出来的虚脱感。眼眶发酸，但连哭的力气都没有了。课本还摊在面前，但那些字已经完全失去了意义。你看着它们，什么都进不去了。</div>`;
    narr+=`<div class="scene-narr">"我是不是废了？"这个想法像一块石头，沉甸甸地压在胸口。<br><br>……但你还活着。你还有呼吸。崩溃不是终点——它只是你的身体在替你按下暂停键。也许现在最需要做的，不是继续看书，而是允许自己休息。允许自己不完美。允许自己在需要帮助的时候，向别人伸出手。</div>`;
    narr+=`<div class="scene-narr" style="font-size:0.78rem;color:var(--amber);border-left-color:var(--amber)">如果你在现实中也经历过类似的感受——持续的焦虑、失眠、无力感、觉得自己"不行了"——请记住：这不是你的错，也不是你一个人的事。学校心理咨询中心的老师可以帮你。拨打24小时心理援助热线：<b>400-161-9995</b>。你值得被帮助。</div>`;

    narr+=`<div class="scene-narr">现在你的心跳很快，手心一直在出汗。明明坐在安全的宿舍里，身体却像在逃命一样紧绷。胃在痉挛，太阳穴在跳，连呼吸都变得又浅又急。你的身体已经被焦虑完全接管了。</div>`;

    narr+=`<div class="scene-narr" style="font-size:0.78rem;color:var(--amber);border-left-color:var(--amber)">过度焦虑不是性格缺陷，而是一种可以学习管理的心理状态。如果你经常在压力下陷入"越焦虑越无法行动、越无法行动越焦虑"的死循环，这可能是焦虑障碍的信号。认知行为疗法（CBT）对考试焦虑有很好的效果。你不需要独自对抗它——学校心理咨询中心可以帮你找到方法。</div>`;
  }else if(ending.code==='ESC'){
    narr=`<div class="scene-narr">天亮了。你躺在床上，被子蒙到下巴。课本安安静静地躺在桌上，和昨晚七点的时候一模一样——几乎没翻几页。</div>`;
    narr+=`<div class="scene-narr">你确实过了一个不那么痛苦的夜晚。你刷了视频，和朋友聊了天，吃了夜宵，甚至睡了一个还算完整的觉。焦虑？好像没怎么感受到。你成功地把它挡在了意识之外。</div>`;
    narr+=`<div class="scene-narr">但现在，早上八点，距离考试还有六个小时——焦虑带着利息回来了。而且比昨晚更猛。因为昨晚你至少还能骗自己"还有时间"，现在，你没有这个借口了。</div>`;
    narr+=`<div class="scene-narr">你盯着天花板，心里有一个声音在说："早知道昨晚哪怕看两个小时呢。"<br><br>逃避是人类面对威胁时最本能的反应之一。它不丢人。但它也有代价——每次你绕过一个困难，你就少了一次证明"我能做到"的机会。这一次绕过去了，下一次呢？</div>`;
  }else{
    narr=`<div class="scene-narr">天亮了。你从椅子上站起来，走到窗边。远处的天际线被朝霞染成了粉金色。校园的轮廓在晨光中慢慢清晰起来。</div>`;

  /* exam outcome prediction */
  let examPred='';
  if(ending.code==='AWK'){
    examPred=`<div class="exam-prediction"><div class="exam-prediction-label">考场推演</div><div class="exam-prediction-title">预计考试表现：中等</div><div class="exam-prediction-text">你的复习量不算充分——五章内容大概吃透了三章出头。但你走进考场时，心态是所有情况中最稳的。你不会因为看到不会的题而慌乱，因为你已经接受了"不完美"。选择题和基础题能拿到大部分分数，大题能写出思路框架。你可能不会拿高分，但大概率能过。更重要的是，这种心态会让你在接下来的每一门考试中都更从容。</div></div>`;
  }else if(ending.code==='MNG'){
    examPred=`<div class="exam-prediction"><div class="exam-prediction-label">考场推演</div><div class="exam-prediction-title">预计考试表现：中等偏上</div><div class="exam-prediction-text">有意思的是，你的心态可能是所有结局中最好的——不是因为你准备得最充分，而是因为你不再把"考试成绩"当作衡量自己价值的唯一标准。这种心态上的松弛感，反而能让你的大脑更高效地运转。你走进考场时，不会因为看到不会的题而崩溃，因为你已经知道：你的价值不由这张试卷定义。选择题凭扎实的理解来答，大题能写出清晰的思路框架。成绩不会是最高的，但一定不会是最差的。而你从这一夜中真正学到的东西，远比任何一次考试分数都重要。</div></div>`;
  }else if(ending.code==='DAY'){
    examPred=`<div class="exam-prediction"><div class="exam-prediction-label">考场推演</div><div class="exam-prediction-title">预计考试表现：良好</div><div class="exam-prediction-text">重点章节过了一遍，公式卡片在考前还能再看一眼。你的精力虽然不算充沛，但还在可用范围内——大脑的基本运转没有问题。考场上你能保持正常节奏：会做的题做对，不会的题能写出部分步骤拿过程分。如果运气好，考到了你重点复习的那几章，分数还能再高一些。及格概率很高，甚至有可能拿到一个让你自己意外的成绩。</div></div>`;
  }else if(ending.code==='GRT'){
    examPred=`<div class="exam-prediction"><div class="exam-prediction-label">考场推演</div><div class="exam-prediction-title">预计考试表现：及格与不及格之间</div><div class="exam-prediction-text">你看了很多内容，但极度的疲劳让记忆巩固效果很差——凌晨三点以后看的东西，大概率在考场上想不起来。更麻烦的是，你的大脑现在处于严重的睡眠债务中：反应变慢、注意力涣散、工作记忆容量锐减。你可能会在考场上犯一些清醒时绝不会犯的低级错误——看错题号、计算失误、漏掉条件。你为这一夜付出了全部精力，但身体的账不会说谎。挂科风险不低。</div></div>`;
  }else if(ending.code==='BRK'){
    examPred=`<div class="exam-prediction"><div class="exam-prediction-label">考场推演</div><div class="exam-prediction-title">预计考试表现：不及格</div><div class="exam-prediction-text">以你目前的身心状态，坐在考场里两个小时本身就是一种煎熬。你的大脑几乎无法进行有效的信息提取——即使昨晚看过的内容，此刻也像隔了一层雾。选择题靠直觉可以蒙对一些，但大题大概率只能写个公式就交卷。挂科几乎是确定的。但这不是终点——补考还在，更重要的是，你需要在下一次考试前，先解决让你崩溃的那个根本问题。成绩可以补，心理健康不能欠。</div></div>`;
  }else if(ending.code==='OVR'){
    examPred=`<div class="exam-prediction"><div class="exam-prediction-label">考场推演</div><div class="exam-prediction-title">预计考试表现：及格与不及格之间</div><div class="exam-prediction-text">你花了一整夜坐在书前，但焦虑吃掉了大部分学习效果。那些在焦虑状态下"看过"的内容，编码质量极低——就像在暴风雨中拍的照片，模糊不清。考场上，高焦虑状态还会继续干扰你：看到不会的题会触发更强的恐慌反应，大脑会"冻住"，连本来会的题也想不起来了。这就是心理学中的"焦虑导致的提取失败"。你最需要的不是再多看一章书，而是学会一套考前的情绪调节方法——比如腹式呼吸、正念扫描，或者考前15分钟的"焦虑清空"书写练习。</div></div>`;
  }else if(ending.code==='ESC'){
    examPred=`<div class="exam-prediction"><div class="exam-prediction-label">考场推演</div><div class="exam-prediction-title">预计考试表现：不及格</div><div class="exam-prediction-text">你精力充沛，但知识储备几乎为零——这是最尴尬的组合。你的大脑运转正常，注意力集中，反应灵敏……但提取不到任何有用的信息，因为你根本没有输入。选择题全靠猜，概率上能对四分之一。大题能写个"解："然后就没有然后了。你可能是考场上状态最好的挂科者——清醒地看着卷子上的每一道题，清醒地意识到自己什么都不会。这种感觉比熬夜更难受。挂科概率极高。</div></div>`;
  }else{
    examPred=`<div class="exam-prediction"><div class="exam-prediction-label">考场推演</div><div class="exam-prediction-title">预计考试表现：及格</div><div class="exam-prediction-text">你的准备算不上充分，但也不至于毫无头绪。一部分章节认真看过了，一部分草草翻了翻，还有一部分完全没碰。考场上你会遇到"这个我看过但想不起来"的情况——这是半吊子复习的典型体验。选择题和基础题有一定把握，大题看运气：考到你复习过的章节就能写，没复习过的就只能编。总体来说，及格应该没问题，但离"好成绩"还有不小的距离。这不是最好的结果，但也远不是最坏的。</div></div>`;
  }

  /* build HTML */
  let html=narr;
  html+=examPred;
  html+=`<div class="ending-card" style="border-color:${ending.color}40">`;
  html+=`<div class="ending-icon">${ending.icon}</div>`;
  html+=`<div class="ending-title" style="color:${ending.color}">结局 · ${ending.title}</div>`;
  html+=`<div class="ending-sub">${ending.sub}</div>`;
  html+=`</div>`;

  /* summary card */
  html+=`<div class="summary-card">`;
  html+=`<div class="summary-title">这一夜的你</div>`;
  html+=`<div class="summary-row"><span class="summary-label">应对风格</span><span class="summary-value">${style}</span></div>`;
  html+=`<div class="summary-row"><span class="summary-label">最终焦虑值</span><span class="summary-value">${anxiety}</span></div>`;
  html+=`<div class="summary-row"><span class="summary-label">最终精力值</span><span class="summary-value">${energy}</span></div>`;
  html+=`<div class="summary-row"><span class="summary-label">最终自我效能</span><span class="summary-value">${efficacy}</span></div>`;

  /* ending analysis */
  let analysis='';
  if(ending.code==='AWK') analysis='你在这个孤独的夜晚，完成了一次了不起的心理突破。你开始意识到：焦虑不是敌人，而是信号；疲惫不是软弱，而是边界。真正的自我效能不是"我能熬多久"，而是"我能多清醒地做选择"。这种元认知能力——观察自己、理解自己、调节自己——才是大学生活中最重要的技能。';
  else if(ending.code==='MNG') analysis='这个结局涉及心理学中一个最深层的主题：<b>存在主义心理学中的"意义感"</b>。维克多·弗兰克尔在《活出生命的意义》中提出：人类最根本的驱动力不是快乐，而是意义。当你在凌晨四点五十分看着窗外的飞蛾，写下"我在这里，这就是意义"的时候——你触及的不是考试焦虑的应对策略，而是一个更根本的问题：<b>我为什么要在这里？我为什么要坚持？</b><br><br>你今晚做到的事情，在积极心理学中有一个专门的名字：<b>"意义建构"（meaning-making）</b>。它指的是：在困境中主动寻找和创造意义，而不是等待环境给你一个"合理的解释"。研究表明，具有高意义感的个体，在面对压力时表现出更强的心理韧性、更低的焦虑水平、更好的身心健康状况。<br><br>你今晚的选择路径——面对过去的失败（认知重评）→ 选择自我慈悲（自我关怀）→ 在凌晨的窗口前停下来思考"为什么"（存在性反思）——这不是教科书上的"正确应对策略"，而是一个人在真实的困境中，自发地走向了心理成长的方向。这比任何技巧都珍贵。<br><br><b>弗兰克尔说过：\u201c那些知道\u2018为什么\u2019而活的人，可以忍受任何\u2018如何\u2019活。\u201d你今晚找到了你的\u2018为什么\u2019。这比任何一门课的成绩都重要。</b>';
  else if(ending.code==='DAY') analysis='你找到了一种可持续的方式度过这一夜。你没有被焦虑吞噬，也没有盲目硬撑。这种"带着焦虑往前走"的能力，心理学称之为"心理韧性"。它不是没有恐惧，而是在恐惧中仍然能做出理性的选择。天亮的时候，你不一定准备得最充分——但你的状态，可能是最好的。';
  else if(ending.code==='GRT') analysis='你确实坚持下来了，这需要巨大的意志力。但长期来看，"硬撑"是一种高消耗、低可持续的应对方式。你的身体和心理都在发出警告信号——持续忽视这些信号，最终的代价可能远超一次考试。下次遇到类似情况，也许可以问问自己："我是在坚持，还是在惩罚自己？"';
  else if(ending.code==='BRK') analysis='崩溃不是失败——它是你的身心在说"够了"。长期高焦虑和极度疲劳会导致"心理资源耗竭"，在这种状态下，任何人都无法正常运转。重要的是：崩溃之后会怎样？如果这种情况反复出现，也许是时候寻求专业帮助了。学校的心理咨询中心是一个很好的起点。';
  else if(ending.code==='OVR') analysis='心理学中有一个"耶克斯-多德森定律"：适度的焦虑能提升表现，但超过一个临界点后，焦虑不再是动力，而变成了阻力。你今晚经历的就是后者——焦虑水平远远超过了最优区间，大脑的"战斗或逃跑"反应被持续激活，前额叶的理性思维能力几乎被完全压制。这不是意志力的问题，而是神经系统的生理限制。好消息是：焦虑管理是可以学习的技能，呼吸训练、渐进性肌肉放松、认知重构都是经过验证的有效方法。';
  else if(ending.code==='ESC') analysis='逃避在短期内确实能缓解焦虑——但它的代价是：问题还在那里，而你用来解决问题的时间更少了。心理学中有个概念叫"体验性回避"：越是不愿面对的东西，它在心里占的空间越大。不过，认识到自己在逃避，本身就是改变的第一步。';
  else analysis='你的这一夜，没有走向任何极端。你做了一些好的选择，也做了一些不那么好的选择——就像大多数真实的夜晚一样。生活不是非黑即白的，大多数时候，我们都在灰色地带里摸索。重要的是，你愿意继续摸索。';

  html+=`<div class="analysis-box"><div class="analysis-label">心理学视角</div><div class="analysis-text">${analysis}</div></div>`;
  html+=`<div class="reflect-box"><div class="reflect-label">课 后 反 思</div>`;
  html+=`<div class="reflect-q">当你独自面对压力时，你通常是"做点什么来缓解焦虑"，还是"什么都做不了，只能等焦虑过去"？你觉得哪种方式更有效？</div>`;
  html+=`<div class="reflect-q">游戏中有"刷手机""吃零食""看一集剧"这样的选项——现实中你有没有类似的"拖延仪式"？你觉得它们是在帮你恢复精力，还是在消耗精力？</div>`;
  html+=`<div class="reflect-q">如果明天就是考试，而现在是凌晨两点，你还没准备好——这种情境下，你最需要的是什么？一个陪你的人、一个清晰的计划、还是允许自己"不完美"的勇气？</div>`;
  html+=`<div class="reflect-hint">这些问题没有标准答案。可以写在纸上，也可以带到课堂讨论中。</div></div>`;
  html+=`</div>`;

  /* archive */
  const gCode=gender==='M'?'M':'F';
  const cSeq=choices.join('');
  const archiveCode=`E5-${gCode}-${cSeq}-${ending.code}`;
  saveGameRecord('E5',archiveCode,ending.title,ending.icon,ending.code);
  html+=`<div class="archive-section">`;
  html+=`<div class="archive-label">存档代码</div>`;
  html+=`<div class="archive-code" id="archiveCode">${archiveCode}</div>`;
  html+=`<button class="btn-copy" onclick="copyArchive()">复制存档代码</button>`;
  html+=`</div>`;

  html+=`<div class="scene-narr" style="text-align:center;margin-top:20px;font-size:0.8rem;color:var(--ink4)">感谢你体验「独处的那一夜」<br>每一个深夜独处的人，都值得被温柔以待。</div>`;
  html+=`<div style="text-align:center;margin:24px 0 8px"><button class="btn-restart" onclick="location.reload()">重新开始</button></div>`;
  html+=`<div style="text-align:center;margin-bottom:24px"><a class="btn-back" href="index.html">返回事件选择</a></div>`;
  html+=`<div class="scroll-anchor"></div>`;
  const div=document.createElement('div');
  div.innerHTML=html;
  storyEl.appendChild(div);
  requestAnimationFrame(()=>window.scrollTo({top:0,behavior:'instant'}));
}

function copyArchive(){
  const code=document.getElementById('archiveCode').textContent;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(code).then(()=>{
      const btn=document.querySelector('.btn-copy');
      btn.textContent='已复制 ✓';setTimeout(()=>btn.textContent='复制存档代码',1500);
    }).catch(()=>fallbackCopy(code));
  }else{fallbackCopy(code)}
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');ta.value=text;
  ta.style.cssText='position:fixed;left:-9999px';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');
    const btn=document.querySelector('.btn-copy');
    btn.textContent='已复制 ✓';setTimeout(()=>btn.textContent='复制存档代码',1500);
  }catch(e){}
  document.body.removeChild(ta);
}

</script>
