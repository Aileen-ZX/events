<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电话那头的期待 · 大学心理事件簿</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5efe6;--bg2:#ede5d8;
  --card:rgba(255,250,242,0.75);--card-hover:rgba(255,250,242,0.95);
  --warm:#8a6e4e;--warm-light:#b08a60;--warm-dim:rgba(138,110,78,0.1);
  --teal:#5a8a7a;--teal-light:#7aaa9a;--teal-dim:rgba(90,138,122,0.1);
  --rose:#b07070;--rose-dim:rgba(176,112,112,0.1);
  --ink:#3a3228;--ink2:#6b5e50;--ink3:#9a8a78;--ink4:#c4b8a4;
  --green:#6a9a70;--red:#b05050;
  --self-color:#5a8a7a;--parent-color:#b08a60;
  --font-body:Georgia,'Songti SC','SimSun','Noto Serif CJK SC',serif;
  --font-ui:system-ui,'PingFang SC',sans-serif;
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 500px 400px at 25% 25%,rgba(90,138,122,0.08),transparent 70%),
    radial-gradient(ellipse 500px 400px at 75% 65%,rgba(176,138,96,0.08),transparent 70%),
    radial-gradient(ellipse 300px 300px at 50% 50%,rgba(176,112,112,0.05),transparent 70%)}
#app{position:relative;z-index:1;max-width:520px;margin:0 auto;min-height:100vh;padding:0 20px}
.screen{display:none;opacity:0}.screen.active{display:block;animation:fadeUp 0.8s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ===== TITLE SCREEN ===== */
#title-screen{text-align:center}
#title-screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;animation:fadeUp 1s ease forwards}
.title-icon{width:80px;height:80px;margin-bottom:28px;border-radius:50%;border:2px solid var(--warm-light);display:flex;align-items:center;justify-content:center;font-size:1.6rem;animation:iconPulse 3s ease-in-out infinite}
@keyframes iconPulse{0%,100%{box-shadow:0 0 20px rgba(138,110,78,0.1)}50%{box-shadow:0 0 40px rgba(138,110,78,0.2)}}
.title-main{font-size:1.8rem;font-weight:700;letter-spacing:0.1em;color:var(--ink);margin-bottom:6px}
.title-sub{font-size:0.82rem;color:var(--ink3);letter-spacing:0.25em;margin-bottom:40px}
.btn-start{background:transparent;border:1px solid var(--warm-light);color:var(--warm);padding:14px 44px;font-size:0.9rem;letter-spacing:0.2em;cursor:pointer;border-radius:1px;transition:all 0.3s;font-family:var(--font-body)}
.btn-start:hover{background:var(--warm-dim);box-shadow:0 0 30px rgba(138,110,78,0.1)}

/* ===== GENDER SCREEN ===== */
#gender-screen{display:none;opacity:0;min-height:100vh;text-align:center}
#gender-screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;animation:fadeUp 0.6s ease forwards}
.sel-heading{font-size:1.05rem;color:var(--ink);margin-bottom:6px}
.sel-sub{font-size:0.78rem;color:var(--ink3);margin-bottom:28px;letter-spacing:0.1em}
.gender-grid{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.gender-card{width:140px;background:var(--card);border:1px solid rgba(0,0,0,0.06);border-radius:8px;padding:22px 16px;cursor:pointer;transition:all 0.3s;text-align:center}
.gender-card:hover{background:var(--card-hover);border-color:var(--warm-light);transform:translateY(-3px);box-shadow:0 4px 16px rgba(0,0,0,0.06)}
.gender-icon{font-size:2rem;margin-bottom:8px}
.gender-label{font-size:0.9rem;font-weight:600;color:var(--ink);margin-bottom:4px}
.gender-desc{font-size:0.72rem;color:var(--ink2);line-height:1.5}

/* ===== VALUE BAR ===== */
.value-bar{position:sticky;top:0;z-index:100;padding:12px 0 10px;background:linear-gradient(to bottom,var(--bg) 70%,transparent)}
.value-bar-inner{border:1px solid rgba(0,0,0,0.06);border-radius:8px;padding:10px 12px;background:rgba(255,250,242,0.88);backdrop-filter:blur(8px)}
.time-tag{text-align:center;font-size:0.68rem;letter-spacing:0.15em;margin-bottom:8px;padding:3px 0;border-radius:3px;font-weight:600;color:var(--warm);background:rgba(138,110,78,0.08)}
.value-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px}
.value-group{display:flex;flex-direction:column;gap:4px}
.value-group-label{font-size:0.6rem;font-weight:600;letter-spacing:0.1em;margin-bottom:2px}
.value-group-label.self{color:var(--self-color)}
.value-group-label.parent{color:var(--parent-color)}
.value-item{display:flex;align-items:center;gap:6px}
.value-name{font-size:0.6rem;color:var(--ink3);width:42px;flex-shrink:0}
.value-track{flex:1;height:4px;border-radius:2px;background:rgba(0,0,0,0.06);overflow:hidden}
.value-fill{height:100%;border-radius:2px;transition:width 0.8s cubic-bezier(0.34,1.56,0.64,1)}
.value-fill.self{background:var(--self-color)}
.value-fill.parent{background:var(--parent-color)}
.value-num{font-size:0.56rem;color:var(--ink3);width:20px;text-align:right;font-variant-numeric:tabular-nums}

/* ===== NARRATIVE ===== */
.act-label{display:inline-block;font-size:0.68rem;letter-spacing:0.2em;padding:4px 14px;border-radius:3px;margin:28px 0 10px;background:var(--warm-dim);border:1px solid rgba(138,110,78,0.2);color:var(--warm)}
.scene-narr{font-size:0.85rem;line-height:1.9;color:var(--ink2);margin:14px 0;padding-left:14px;border-left:2px solid rgba(138,110,78,0.2)}
.inner-mono{font-size:0.82rem;line-height:1.8;color:var(--ink3);font-style:italic;margin:10px 0;padding:10px 14px;background:rgba(0,0,0,0.02);border-radius:6px}
.inner-mono span{display:block;margin:4px 0;opacity:0;animation:monoIn 0.5s ease forwards}
.inner-mono span:nth-child(2){animation-delay:0.6s}
.inner-mono span:nth-child(3){animation-delay:1.2s}
@keyframes monoIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ===== PHONE / WECHAT BUBBLES ===== */
.phone-area{margin:14px 0;padding:12px;background:rgba(0,0,0,0.02);border-radius:10px}
.phone-label{font-size:0.62rem;color:var(--ink4);text-align:center;margin-bottom:8px;letter-spacing:0.1em}
.phone-msg{margin:8px 0;display:flex;flex-direction:column}
.phone-msg.me{align-items:flex-end}
.phone-msg.them{align-items:flex-start}
.phone-bubble{max-width:75%;padding:10px 14px;border-radius:12px;font-size:0.84rem;line-height:1.6;animation:bubbleIn 0.3s ease}
@keyframes bubbleIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
.phone-msg.me .phone-bubble{background:var(--teal);color:#fff;border-bottom-right-radius:4px}
.phone-msg.them .phone-bubble{background:rgba(255,255,255,0.85);color:var(--ink);border:1px solid rgba(0,0,0,0.06);border-bottom-left-radius:4px}
.phone-msg-name{font-size:0.6rem;color:var(--ink4);margin-bottom:2px;padding:0 4px}
.phone-voice{text-align:center;font-size:0.72rem;color:var(--ink3);margin:8px 0;font-style:italic;padding:8px;background:rgba(138,110,78,0.05);border-radius:6px}

/* ===== CHOICES ===== */
.choices{margin:18px 0}
.choice-prompt{font-size:0.72rem;letter-spacing:0.2em;margin-bottom:10px;color:var(--warm)}
.choice-btn{display:block;width:100%;background:var(--card);border:1px solid rgba(0,0,0,0.05);border-radius:8px;padding:14px 16px;margin-bottom:8px;text-align:left;color:var(--ink);font-size:0.84rem;line-height:1.7;cursor:pointer;transition:all 0.25s;font-family:var(--font-body);position:relative}
.choice-btn:hover{background:var(--card-hover);border-color:var(--warm-light);transform:translateX(4px);box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.choice-btn.disabled{opacity:0.2;pointer-events:none}

/* ===== FEEDBACK ===== */
.feedback-box{margin:14px 0;animation:feedIn 0.4s ease}
@keyframes feedIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.feedback-result{background:var(--card);border-radius:8px;padding:12px 14px;font-size:0.84rem;line-height:1.8;color:var(--ink);margin-bottom:8px;border-left:3px solid var(--warm-light)}
.value-change{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.value-chip{font-size:0.7rem;padding:3px 8px;border-radius:3px;font-weight:600}
.value-chip.up{background:rgba(106,154,112,0.1);color:var(--green)}
.value-chip.down{background:rgba(176,80,80,0.1);color:var(--red)}
.analysis-box{background:linear-gradient(135deg,rgba(90,138,122,0.05),rgba(176,138,96,0.04));border:1px solid rgba(138,110,78,0.1);border-radius:8px;padding:12px 14px;margin:8px 0 16px}
.analysis-label{font-size:0.62rem;letter-spacing:0.2em;color:var(--warm);margin-bottom:5px}
.analysis-text{font-size:0.78rem;line-height:1.8;color:var(--ink2)}
.btn-continue{display:block;margin:18px auto;background:transparent;border:1px solid rgba(0,0,0,0.08);color:var(--ink3);padding:10px 30px;font-size:0.8rem;cursor:pointer;border-radius:3px;transition:all 0.3s;font-family:var(--font-body);letter-spacing:0.15em}
.btn-continue:hover{border-color:var(--warm);color:var(--warm)}

/* ===== UNSAID WORDS (collapsible) ===== */
.unsaid-wrap{margin:12px 0 6px;border:1px dashed rgba(176,138,96,0.35);border-radius:8px;overflow:hidden;background:rgba(176,138,96,0.03)}
.unsaid-toggle{display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;background:transparent;border:none;cursor:pointer;font-family:var(--font-body);font-size:0.78rem;color:var(--warm);letter-spacing:0.12em;transition:background 0.2s}
.unsaid-toggle:hover{background:rgba(176,138,96,0.06)}
.unsaid-arrow{display:inline-block;font-size:0.6rem;transition:transform 0.3s}
.unsaid-wrap.open .unsaid-arrow{transform:rotate(90deg)}
.unsaid-body{max-height:0;overflow:hidden;transition:max-height 0.4s ease,padding 0.3s ease;padding:0 14px}
.unsaid-wrap.open .unsaid-body{max-height:600px;padding:0 14px 14px}
.unsaid-line{font-size:0.8rem;line-height:1.85;color:var(--ink2);margin:6px 0}
.unsaid-line .speaker{font-weight:600;color:var(--warm);font-size:0.72rem;margin-right:4px}
.unsaid-line em{font-style:italic;color:var(--ink3);font-size:0.76rem}

/* ===== SPLIT VIEW ===== */
.split-view{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.split-col{padding:14px;border-radius:8px;font-size:0.82rem;line-height:1.8;color:var(--ink2)}
.split-col.self{background:rgba(90,138,122,0.06);border:1px solid rgba(90,138,122,0.12)}
.split-col.parent{background:rgba(176,138,96,0.06);border:1px solid rgba(176,138,96,0.12)}
.split-col-label{font-size:0.65rem;font-weight:600;letter-spacing:0.1em;margin-bottom:6px}
.split-col.self .split-col-label{color:var(--self-color)}
.split-col.parent .split-col-label{color:var(--parent-color)}

/* ===== FUTURE MIRROR ===== */
.future-section{margin:20px 0}
.future-year{margin:16px 0;padding:14px;border-radius:8px;background:var(--card);border:1px solid rgba(0,0,0,0.05)}
.future-year-label{font-size:0.68rem;font-weight:600;color:var(--warm);letter-spacing:0.15em;margin-bottom:8px}
.future-year-text{font-size:0.82rem;line-height:1.85;color:var(--ink2)}

/* ===== ENDINGS ===== */
.ending-icon{font-size:2.8rem;text-align:center;margin:32px 0 12px}
.ending-title{font-size:1.3rem;text-align:center;color:var(--ink);margin-bottom:6px;font-weight:700}
.ending-sub{font-size:0.82rem;text-align:center;color:var(--ink3);margin-bottom:18px;font-style:italic}
.ending-text{font-size:0.86rem;line-height:2;color:var(--ink2);margin:16px 0}
.ending-comment{background:linear-gradient(135deg,rgba(90,138,122,0.06),rgba(176,138,96,0.04));border:1px solid rgba(138,110,78,0.12);border-radius:8px;padding:16px;margin:18px 0}
.ending-comment-label{font-size:0.62rem;color:var(--warm);letter-spacing:0.2em;margin-bottom:6px}
.ending-comment-text{font-size:0.8rem;line-height:1.85;color:var(--ink2)}
.summary-card{background:var(--card);border:1px solid rgba(0,0,0,0.05);border-radius:10px;padding:20px;margin:20px 0;text-align:center}
.summary-item{margin:12px 0}
.summary-label{font-size:0.68rem;color:var(--ink3);letter-spacing:0.12em;margin-bottom:3px}
.summary-value{font-size:0.95rem;color:var(--ink);font-weight:600}
.summary-values{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:14px 0}
.summary-val-item{background:rgba(0,0,0,0.02);padding:8px 10px;border-radius:4px;text-align:left}
.summary-val-name{font-size:0.68rem;color:var(--ink3)}
.summary-val-num{font-size:0.9rem;font-weight:600;color:var(--ink)}
.summary-tip{font-size:0.78rem;color:var(--ink2);line-height:1.8;text-align:left;margin-top:14px;padding-top:12px;border-top:1px solid rgba(0,0,0,0.05)}
.reflect-box{margin:20px 0;padding:18px;border-radius:8px;background:linear-gradient(135deg,rgba(90,138,122,0.04),rgba(176,138,96,0.03));border:1px solid rgba(138,110,78,0.18)}
.reflect-label{font-size:0.65rem;letter-spacing:0.25em;color:var(--warm);margin-bottom:10px;font-weight:600}
.reflect-q{font-size:0.78rem;line-height:1.85;color:var(--ink2);margin:10px 0;padding-left:14px;border-left:2px solid rgba(138,110,78,0.3)}
.reflect-hint{font-size:0.68rem;color:var(--ink3);margin-top:12px;font-style:italic}
.btn-restart{display:inline-block;margin-top:18px;background:var(--warm-dim);border:1px solid rgba(138,110,78,0.3);color:var(--warm);padding:10px 34px;font-size:0.85rem;cursor:pointer;border-radius:3px;transition:all 0.3s;font-family:var(--font-body);letter-spacing:0.15em}
.btn-restart:hover{background:rgba(138,110,78,0.15)}
.btn-back{display:inline-block;margin-top:10px;background:transparent;border:1px solid rgba(0,0,0,0.06);color:var(--ink4);padding:9px 28px;font-size:0.78rem;cursor:pointer;border-radius:3px;transition:all 0.3s;font-family:var(--font-body);text-decoration:none}
.btn-back:hover{border-color:var(--warm);color:var(--warm)}
.archive-section{margin:18px 0;padding:16px;background:linear-gradient(135deg,rgba(90,138,122,0.06),rgba(176,138,96,0.04));border:1px dashed rgba(138,110,78,0.3);border-radius:8px;text-align:center}
.archive-label{font-size:0.62rem;color:var(--warm);letter-spacing:0.25em;margin-bottom:8px}
.archive-code{font-family:var(--font-ui);font-size:0.82rem;color:var(--ink);background:rgba(255,255,255,0.6);border:1px solid rgba(0,0,0,0.08);border-radius:4px;padding:10px 14px;margin:6px 0 10px;letter-spacing:0.08em;word-break:break-all;user-select:all}
.btn-copy{background:var(--warm-dim);border:1px solid rgba(138,110,78,0.3);color:var(--warm);padding:7px 20px;font-size:0.75rem;cursor:pointer;border-radius:3px;transition:all 0.3s;font-family:var(--font-body);letter-spacing:0.1em}
.btn-copy:hover{background:rgba(138,110,78,0.15)}
.archive-hint{font-size:0.62rem;color:var(--ink4);margin-top:8px}
.scroll-anchor{height:1px}
/* === MY RECORDS === */
.my-records-block{width:100%;max-width:380px;margin:0 auto 20px}
.my-records-toggle{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;cursor:pointer;background:rgba(90,138,122,0.06);border:1px solid rgba(90,138,122,0.12);border-radius:8px;transition:all 0.3s;user-select:none}
.my-records-toggle:hover{background:rgba(90,138,122,0.1)}
.my-records-label{font-size:0.75rem;letter-spacing:0.1em;color:inherit;opacity:0.6}
.my-records-arrow{font-size:0.7rem;opacity:0.4;transition:transform 0.3s}
.my-records-block.expanded .my-records-arrow{transform:rotate(180deg)}
.my-records-list{max-height:0;overflow:hidden;transition:max-height 0.4s ease,opacity 0.3s ease;opacity:0}
.my-records-block.expanded .my-records-list{max-height:600px;opacity:1;margin-top:8px}
.my-record-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;margin-bottom:4px;background:rgba(90,138,122,0.04);border:1px solid rgba(90,138,122,0.06);border-radius:6px;transition:background 0.2s}
.my-record-item:hover{background:rgba(90,138,122,0.08)}
.my-record-icon{font-size:1.1rem;flex-shrink:0;margin-top:2px}
.my-record-info{flex:1;min-width:0}
.my-record-title{font-size:0.78rem;font-weight:600;line-height:1.4;color:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.my-record-meta{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
.my-record-code{font-family:'Courier New',monospace;font-size:0.65rem;opacity:0.5;letter-spacing:0.03em}
.my-record-date{font-size:0.62rem;opacity:0.4}
@media(max-width:540px){
  #app{padding:0 16px}
  .title-main{font-size:1.5rem}
  .split-view{grid-template-columns:1fr;gap:8px}
}
</style>
</head>
<body>
<div id="app">
  <div id="title-screen" class="screen active">
    <div class="title-icon">📞</div>
    <div class="title-main">电话那头的期待</div>
    <div class="title-sub">大学 · 心理事件簿</div>
    <button class="btn-start" onclick="startGame()">开 始 故 事</button>
  </div>
  <div id="gender-screen" class="screen">
    <div class="sel-heading">选择你的角色</div>
    <div class="sel-sub">不同的身份，相似的期待</div>
    <div class="gender-grid">
      <div class="gender-card" onclick="selectGender('M')"><div class="gender-icon">👦</div><div class="gender-label">男生</div><div class="gender-desc">儿子的视角<br>父母的期望</div></div>
      <div class="gender-card" onclick="selectGender('F')"><div class="gender-icon">👧</div><div class="gender-label">女生</div><div class="gender-desc">女儿的视角<br>家人的牵挂</div></div>
    </div>
  </div>
  <div id="game-screen" class="screen">
    <div class="value-bar" id="value-bar"></div>
    <div id="story"></div>
  </div>
</div>

<script>
/* === RECORD STORAGE === */
function saveGameRecord(eid,code,title,icon,ec){try{var a=JSON.parse(localStorage.getItem('psych_game_records')||'{}');if(!a[eid])a[eid]=[];a[eid].unshift({code:code,title:title,icon:icon,endingCode:ec,ts:Date.now()});if(a[eid].length>20)a[eid]=a[eid].slice(0,20);localStorage.setItem('psych_game_records',JSON.stringify(a));}catch(e){}}
function getGameRecords(eid){try{var a=JSON.parse(localStorage.getItem('psych_game_records')||'{}');return a[eid]||[];}catch(e){return[];}}
function renderRecordsBlock(eid){var recs=getGameRecords(eid);if(!recs.length)return;var ts=document.getElementById('title-screen');if(!ts)return;var btn=ts.querySelector('.btn-start');if(!btn)return;var b=document.createElement('div');b.className='my-records-block';b.innerHTML='<div class="my-records-toggle" onclick="this.parentElement.classList.toggle(\'expanded\')"><span class="my-records-label">\uD83D\uDCCB 我的记录 ('+recs.length+')</span><span class="my-records-arrow">\u25BE</span></div><div class="my-records-list">'+recs.map(function(r){var d=new Date(r.ts);var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');return '<div class="my-record-item"><span class="my-record-icon">'+r.icon+'</span><div class="my-record-info"><div class="my-record-title">'+r.title+'</div><div class="my-record-meta"><span class="my-record-code">'+r.code+'</span><span class="my-record-date">'+ds+'</span></div></div></div>';}).join('')+'</div>';ts.insertBefore(b,btn);}
renderRecordsBlock('E6');
// ============================================================
//  EVENT 6: 电话那头的期待 — PARENT-CHILD EXPECTATION TRACKS
// ============================================================

/* ---- STATE ---- */
let gender='M';
let choices=[];
let selfDir=50;    // 自我方向：你对自己人生的坚定程度 (0=完全顺从, 100=完全坚持)
let parentExp=50;  // 父母期待：父母对你的认可/理解程度 (0=完全冲突, 100=完全理解)
let understand=50; // 理解度：你与父母之间的相互理解 (0=隔阂, 100=理解)
let consistency=50;// 自我一致性：你的行为与内心是否一致 (0=割裂, 100=一致)
let act=0;

const storyEl=document.getElementById('story');

/* ---- HELPERS ---- */
function clamp(v){return Math.max(0,Math.min(100,Math.round(v)))}
function applyDeltas(d){
  if(d.self) selfDir+=d.self;
  if(d.parent) parentExp+=d.parent;
  if(d.und) understand+=d.und;
  if(d.con) consistency+=d.con;
  selfDir=clamp(selfDir);parentExp=clamp(parentExp);
  understand=clamp(understand);consistency=clamp(consistency);
  renderValueBar();
}

/* ---- SCREEN MANAGEMENT ---- */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');s.style.display='none'});
  const el=document.getElementById(id);
  el.style.display='';
  void el.offsetWidth;
  el.classList.add('active');
  window.scrollTo({top:0,behavior:'instant'});
}
function startGame(){showScreen('gender-screen')}
function selectGender(g){
  gender=g;
  selfDir=50;parentExp=50;understand=50;consistency=50;
  choices=[];act=0;
  storyEl.innerHTML='';
  showScreen('game-screen');
  renderValueBar();
  showPrologue();
}

/* ---- TIME LABELS ---- */
const TIME_LABELS=['高考暑假','大一下·长假','大二上·电话','大二寒假·春节','大二暑假·深夜','大三上·电话','大三下·实习','大四上·抉择'];

/* ---- VALUE BAR ---- */
function renderValueBar(){
  const vb=document.getElementById('value-bar');
  const timeText=TIME_LABELS[act]||'';
  vb.innerHTML=`<div class="value-bar-inner">
    <div class="time-tag">${timeText}</div>
    <div class="value-grid">
      <div class="value-group">
        <div class="value-group-label self">你的轨迹</div>
        <div class="value-item"><span class="value-name">自我方向</span><div class="value-track"><div class="value-fill self" style="width:${clamp(selfDir)}%"></div></div><span class="value-num">${clamp(selfDir)}</span></div>
        <div class="value-item"><span class="value-name">自我一致</span><div class="value-track"><div class="value-fill self" style="width:${clamp(consistency)}%"></div></div><span class="value-num">${clamp(consistency)}</span></div>
      </div>
      <div class="value-group">
        <div class="value-group-label parent">父母轨迹</div>
        <div class="value-item"><span class="value-name">父母认可</span><div class="value-track"><div class="value-fill parent" style="width:${clamp(parentExp)}%"></div></div><span class="value-num">${clamp(parentExp)}</span></div>
        <div class="value-item"><span class="value-name">相互理解</span><div class="value-track"><div class="value-fill parent" style="width:${clamp(understand)}%"></div></div><span class="value-num">${clamp(understand)}</span></div>
      </div>
    </div>
  </div>`;
}

/* ---- COMMON HELPERS ---- */
function appendHTML(html){
  const div=document.createElement('div');
  div.innerHTML=html;
  storyEl.appendChild(div);
  requestAnimationFrame(()=>{
    const bar=document.getElementById('value-bar');
    const offset=bar&&bar.offsetHeight?bar.offsetHeight+8:0;
    const top=div.getBoundingClientRect().top+window.pageYOffset-offset;
    window.scrollTo({top:Math.max(0,top),behavior:'smooth'});
  });
}
function disableChoices(){
  document.querySelectorAll('.choice-btn:not(.disabled)').forEach(b=>b.classList.add('disabled'));
}
function renderValueChips(d){
  const labels={self:'自我方向',parent:'父母认可',und:'相互理解',con:'自我一致'};
  let html='<div class="value-change">';
  for(const k of ['self','parent','und','con']){
    if(d[k]&&d[k]!==0){
      const cls=d[k]>0?'up':'down';
      const sign=d[k]>0?'+':'';
      html+=`<span class="value-chip ${cls}">${labels[k]} ${sign}${d[k]}</span>`;
    }
  }
  return html+'</div>';
}

let unsaidCounter=0;
function toggleUnsaid(id){
  document.getElementById(id).classList.toggle('open');
}
function renderUnsaid(lines){
  const id='unsaid-'+(unsaidCounter++);
  let html=`<div class="unsaid-wrap" id="${id}">`;
  html+=`<button class="unsaid-toggle" onclick="toggleUnsaid('${id}')"><span class="unsaid-arrow">▶</span>他们没说出口的话</button>`;
  html+=`<div class="unsaid-body">`;
  for(const l of lines){
    html+=`<div class="unsaid-line">${l}</div>`;
  }
  html+=`</div></div>`;
  return html;
}

/* ---- ENDING SYSTEM ---- */
function getEnding(){
  const s=selfDir,p=parentExp,u=understand,c=consistency;
  // 和解: 理解度高 + 自我一致性高 + 自我方向较高
  if(u>=60&&c>=60&&s>=55) return{code:'REC',icon:'🌿',title:'和解',sub:'不一样的路，也能走到一起'};
  // 爆发: 自我方向高 + 理解度低 + 父母认可低
  if(s>=65&&u<=40&&p<=40) return{code:'EXP',icon:'🔥',title:'爆发',sub:'有些话憋太久，就成了火'};
  // 独立: 自我方向高 + 理解度较高 + 自我一致性高
  if(s>=60&&u>=50&&c>=55) return{code:'IND',icon:'🦅',title:'独立',sub:'我走了很远的路，但没有走丢'};
  // 沉默的隔阂: 理解度低 + 父母认可低
  if(u<=40&&p<=45) return{code:'SIL',icon:'📱',title:'沉默的隔阂',sub:'最熟悉的陌生人'};
  // 表面的和平: 父母认可高 + 自我一致性低
  if(p>=55&&c<=40) return{code:'PCE',icon:'🎭',title:'表面的和平',sub:'一切都好——真的吗？'};
  // fallback based on balance
  if(u>=50&&c>=45) return{code:'IND',icon:'🦅',title:'独立',sub:'我走了很远的路，但没有走丢'};
  if(p>=50&&c<=45) return{code:'PCE',icon:'🎭',title:'表面的和平',sub:'一切都好——真的吗？'};
  return{code:'SIL',icon:'📱',title:'沉默的隔阂',sub:'最熟悉的陌生人'};
}

        ?`毕业后你${act7===1?'读了研':'留在了本地'}。和家的距离不远，但心理的距离越来越大。第一年春节，你在家待了三天就走了——你说工作忙。其实不全是。你只是不知道坐在那张饭桌旁该聊什么。妈妈在你走的时候说"那注意身体"，然后两个人沉默了几秒。"好，先这样吧。"你说。"嗯。"她说。`
        :`毕业后你去了外地。第一年春节没有回家——你说加班走不开。其实不全是。你只是不知道回去之后该聊什么。妈妈在电话里说"那注意身体"，然后两个人沉默了几秒。"好，先这样吧。"你说。"嗯。"她说。然后挂了。`,
      y3:`第三年，你换了手机号，忘了告诉他们。妈妈打旧号码打不通，急了，到处问你的同学。最后你收到一条微信消息："是不是换号了？新号码发给妈。"你发了号码过去，她回了一个"好的"。就这样。没有责怪，也没有追问——但你知道，在那个打不通电话的下午，她一定急坏了。你有点想说"对不起"，但手指在屏幕上停了很久，最终只发了一个"嗯"。`,
      y5:`第五年，爸爸生病住院。你连夜赶回去，在医院走廊里看到妈妈——比你记忆中老了很多。她看到你，先是愣了一下，然后说了句"你怎么才来"。你张了张嘴，想说什么，但一句话都说不出来。\n\n病房里，爸爸躺在床上，看到你来了，说了一句"工作忙吧"。你说"还好"。就这样——你们之间最常用的两个字。\n\n你坐在走廊的塑料椅子上，盯着手机屏幕上和他们的聊天记录：全是"好的""嗯""注意身体"。你突然意识到，你们什么时候开始的呢——变成了最熟悉的陌生人。`
    },
    EXP:{
      y1:`毕业那个夏天，你在电话里和他们吵了一架。你说出了所有压抑的话——"你们从来没问过我想要什么""你们只关心我的成绩和工作""你们爱的不是我，是你们期待中的那个我"。电话那头先是震惊，然后是愤怒，最后是漫长的沉默。你挂了电话，独自坐在出租屋的地板上，浑身发抖。`,
      y3: stayedLocal
        ?`第三年，你${act7===1?'读完了研':'在本地工作'}。住的地方离家不远，但你很少回去。每次过年回家，气氛都像冰窖——大家客客气气的，但谁都知道那些话还横在中间。妈妈试过几次找你聊，你都岔开了话题。不是不想和解，只是不知道该从哪句话开始。`
        :`第三年，你在${cityName}有了自己的小天地。每次过年回家，气氛都像冰窖——大家客客气气的，但谁都知道那些话还横在中间。妈妈试过几次找你聊，你都岔开了话题。不是不想和解，只是不知道该从哪句话开始。`,
      y5:`第五年的某个晚上，妈妈突然发来一条很长的微信。你打开一看——她说："那年你说的那些话，妈妈想了很久。有些话你说得对，爸妈以前确实没有好好听你说过。"\n\n你看了三遍。然后眼泪就掉下来了。\n\n你打了一个电话过去。响了两声就接了——她一直在等。你说了一句从来没说过的话："妈，对不起。我说得太重了。但是那些话——我是认真的。"\n\n她沉默了一会儿，说："妈知道。"\n\n那个电话打了两个小时。是你们之间，最长也最真的一次对话。`
    },
    IND:{
      y1: stayedLocal
        ?`毕业后你${act7===1?'读了本校的研究生':'留在了本地工作'}。不是你最初想走的那条路，但你决定认真地走。第一年有些迷茫——你偶尔会想"如果当初去了${cityName}会怎样"，但每次想起自己做这个选择时的考量，你就能平静下来。你每周给妈妈打一个电话，跟她聊聊生活日常——不再"报喜不报忧"了，而是真实地分享。`
        :`毕业后你去了自己想去的城市，做了自己想做的事。第一年很辛苦——租的房子很小，工资刚够花，有好几次差点打退堂鼓。但每次想起自己为什么选这条路，你就能撑过去。你每周给妈妈打一个电话，跟她聊聊生活日常——不再"报喜不报忧"了，而是真实地分享。`,
      y3: stayedLocal
        ?`第三年，你${act7===1?'研究生快毕业了，找到了一份和自己方向相关的工作':'升了职，工作渐渐有了起色'}。爸妈来你住的地方看了看，妈妈说"收拾得还行"，爸爸说"比我想象的好"。走的时候，妈妈在门口抱了你一下——很用力的那种。她说了一句"你长大了"。`
        :`第三年，你升了职，搬到了稍大一点的房子。爸妈来看你，在你的城市待了一个星期。他们逛了你公司附近的超市，妈妈说"东西真贵啊"，爸爸说"房子是小了点"。但走的那天，妈妈在门口抱了你一下——很用力的那种。她说了一句"你长大了"。`,
      y5:`第五年，你在${stayedLocal?(g==='F'?'一个本地的文学活动上做了一次分享':'一个本地的文化论坛上做了一次策展演讲'):(g==='F'?'一个文学活动上做了一次分享':'一个文化论坛上做了一次策展演讲')}。你把链接发到了家庭群里。爸爸回了一个"👍"——这是他这辈子发过的第一个表情包。妈妈转发到了她的朋友圈，配文是"我家孩子"。\n\n你看着那三个字，笑着笑着就哭了。\n\n不是因为委屈。而是因为你知道，这一路走来的所有坚持、所有争吵、所有沉默和误解——最终都变成了这四个字：\n\n"我家孩子。"`
    }
  };
  return mirrors[code]||mirrors.SIL;
}

function getEndingNarrative(code){
  const narratives={
    REC:{
      text: (function(){
        const act7=choices[7]!==undefined?choices[7]:0;
        const act6=choices[6]!==undefined?choices[6]:0;
        const stayedLocal=(act7===1||act7===2)||(act6===1&&act7!==0);
        if(stayedLocal){
          return '四年的拉扯，终于在这一刻有了一个温柔的着陆。你们各自退了一步，也各自往前走了一步。不是完全按照你最初的计划——但也不是完全按照他们的期待。\n\n在这个过程中，你们学会了一件最难的事：真正地听对方说话。他们开始理解你的热爱不是"不务正业"，你也终于看见了他们那些笨拙的担心背后，藏的是一份不知道怎么表达的爱。';
        }
        return '四年的拉扯，终于在这一刻有了一个温柔的着陆。你走了自己选的路，他们学会了用新的方式去爱你。不是完全理解——也许他们永远无法完全理解你为什么选了那条路。但他们选择了信任。\n\n而你也终于明白，他们那些看似"控制"的话语背后，藏的是一份笨拙的、不知道怎么表达的爱。';
      })(),
      comment:'「和解」不是某一方放弃了自己的立场，而是双方都学会了在"不完全理解"的前提下尊重彼此。心理学家Murray Bowen提出：成熟的家庭关系不是"没有差异"，而是"能够在差异中共存"。\n\n你做到了两件最难的事：坚持自己的方向，同时没有关上沟通的门。这种能力，叫做"有边界的爱"。'
    },
    PCE:{
      text:'从外面看，你和家人的关系很好——逢年过节回家，电话周周不断，朋友圈互相点赞。但只有你自己知道，那些"一切都好"背后，藏了多少没说出口的真话。\n\n你学会了用他们能接受的方式说话。不提那些他们不理解的事，多聊他们关心的日常。这不是虚伪——这是你在漫长的岁月中摸索出的"最省力的相处方式"。\n\n但有时候你会想：如果有一天，你可以完全不用演，他们还会爱你吗？',
      comment:'「表面的和平」的代价是自我压缩。你在关系中放弃了"被完全看见"的权利，换来了冲突的消失。这种模式在心理学中叫"过度适应"——你太擅长察觉别人的需求，以至于忘了自己的。\n\n这不是终局。也许某一天，当你足够强大、足够安全的时候，你会选择打开那扇一直紧闭的门。一句真话，就够了。'
    },
    SIL:{
      text:'你们不是不爱对方——只是不知道怎么说了。电话越来越短，话题越来越少，每次通话都是那几句"吃饭了吗""注意身体""嗯，知道了"。\n\n你不知道该怎么开口说自己的真实生活——你换了三份工作、分了两次手、有过一段很消沉的日子。这些事你一件都没跟他们说。不是不想说，是害怕说了之后他们会担心、会责怪、会说"当初就叫你听我们的"。\n\n于是沉默成了你们之间最默契的语言。',
      comment:'「沉默的隔阂」往往不是来自某一次大的冲突，而是无数次微小的"算了吧"——算了别说了、算了他们不会懂、算了解释也没用。每一次"算了"都在拉开一点距离，直到有一天回头看，才发现已经走了那么远。\n\n心理学家John Bowlby说：依恋的断裂不是来自距离本身，而是来自"不再尝试靠近"。重建连接的第一步，不是一次完美的对话——而是一个不完美的开口。'
    },
    EXP:{
      text:'那场争吵像是一颗炸弹。你说出了所有压在心里的话——真话，但也是狠话。有些是你早该说的，有些是你在愤怒中说过了头的。\n\n爸妈被你的话伤到了。你也被自己的话伤到了。但至少——一切都不再是假的了。你们之间的空气，第一次如此清澈，虽然清澈得让人刺痛。\n\n爆发不是终点。它是冰封了太久的关系，终于开裂的声音。',
      comment:'「爆发」在心理学中被称为"情感决堤"——当长期积压的未表达情绪超过了承受阈值，就会以激烈的方式喷涌而出。它破坏了旧有的平衡，但也为重建提供了可能。\n\n研究表明，经历过激烈冲突但最终得到修复的关系，往往比从未冲突过的关系更加坚韧。关键在于：爆发之后，是否愿意坐下来，重新听对方说话。'
    },
    IND:{
      text: (function(){
        const act7=choices[7]!==undefined?choices[7]:0;
        const act6=choices[6]!==undefined?choices[6]:0;
        const stayedLocal=(act7===1||act7===2)||(act6===1&&act7!==0);
        if(stayedLocal){
          return '你没有走最远的那条路——但你走了一条自己能站稳的路。这不是妥协，因为你从来没有放弃思考"我到底想要什么"。\n\n你学会了在现有的框架里找到自己的空间，也学会了和父母保持真实的对话。不是每一次都顺利——有些时候你说得太直，有些时候他们听不进去。但你们一直在说。\n\n不是完美的平衡——世界上没有完美的平衡——但是一个你可以站得住的地方。';
        }
        return '你选择了自己的路，也选择了不关上那扇门。这两件事同时做到，比你想象中更难——因为每一次坚持自己的时候，你都要面对父母失望的眼神；每一次主动联系的时候，你都要做好"又被催"的心理准备。\n\n但你做到了。你学会了在"做自己"和"爱他们"之间找到一个不那么痛的位置。不是完美的平衡——世界上没有完美的平衡——但是一个你可以站得住的地方。';
      })(),
      comment:'「独立」在心理学中不是指"不再需要家人"，而是指"在保持自我完整性的前提下，依然能够建立有深度的情感连接"。这种能力被称为"自我分化"（differentiation of self），是心理成熟的核心标志。\n\n你做到了最难的事：你既没有为了自由而切断关系，也没有为了关系而放弃自由。这条路上没有现成的地图——但你走出来了自己的。'
    }
  };
  return narratives[code]||narratives.SIL;
}

function showEnding(){
  storyEl.innerHTML='';
  document.getElementById('value-bar').style.display='none';
  window.scrollTo({top:0,behavior:'instant'});

  const ending=getEnding();
  const narrative=getEndingNarrative(ending.code);
  const mirror=getFutureMirror(ending.code);
  const s=clamp(selfDir),p=clamp(parentExp),u=clamp(understand),c=clamp(consistency);

  // Determine style — per-act semantic classification
  // [assert, compromise, avoid] mapping per act
  let style='',tip='';
  const choiceType=[
    ['assert','avoid','avoid'],       // Prologue: insist / silent / deflect
    ['assert','assert','avoid'],       // Act1: explain / angry outburst / silent
    ['assert','avoid','avoid'],        // Act2: honest / hide bad news / brush off
    ['assert','compromise','avoid'],   // Act3: rebut / smile+talk later / don't care
    ['assert','avoid','avoid'],        // Act4: speak up / fake agree / silent
    ['assert','assert','avoid'],       // Act5: frank / explosive / brush off
    ['assert','compromise','avoid'],   // Act6: insist leave / stay local / delay
    ['assert','compromise','compromise'] // Act7: insist / partial compromise / full surrender
  ];
  let assertCount=0,avoidCount=0,compromiseCount=0;
  choices.forEach((c,i)=>{if(i<choiceType.length){const t=choiceType[i][c]||'avoid';if(t==='assert')assertCount++;else if(t==='compromise')compromiseCount++;else avoidCount++;}});
  if(assertCount>=5){
    style='坚定型沟通者';
    tip='你在大多数时刻选择了直接表达自己的想法和感受。这种勇气在亲子关系中非常珍贵——但也要记得，"我说了"不等于"他们听到了"。真正有效的沟通，不只是把话说出来，还要确认对方接住了。';
  }else if(avoidCount>=5){
    style='回避型沟通者';
    tip='你倾向于在冲突面前保持沉默或敷衍回应。这种策略保护了你免受即时的冲突伤害，但也让父母失去了理解你的机会。每一次"算了"都在拉远你们的距离——试着在安全的时刻，说一句真话。';
  }else if(compromiseCount>=5){
    style='妥协型沟通者';
    tip='你善于在自我需求和家庭期待之间寻找中间地带。这种灵活性是人际关系中的重要能力。但也要觉察：你是真的在"平衡"，还是在"压缩自己"？妥协如果总是单方面的，那就不是妥协，而是顺从。';
  }else if(assertCount>=3&&compromiseCount>=3){
    style='弹性沟通者';
    tip='你的沟通风格在坚持和妥协之间灵活切换——在关键时刻坚持自己，在非核心议题上灵活让步。这种"弹性"是亲子关系中最可持续的模式。继续保持这种既有主见又有温度的节奏。';
  }else{
    style='探索型沟通者';
    tip='你的选择没有明显的固定模式——有时候坚持，有时候退让，有时候沉默。这说明你还在探索与父母的相处之道。探索不是坏事——它意味着你在寻找一种属于自己的方式。只要你愿意继续尝试，方式总会找到的。';
  }

  // Archive code
  const cSeq=choices.map(c=>c).join('');
  const archiveCode=`E6-${gender}-${cSeq}-${ending.code}`;
  saveGameRecord('E6',archiveCode,ending.title,ending.icon,ending.code);

  let html=`<div class="ending-icon">${ending.icon}</div>`;
  html+=`<div class="ending-title">${ending.title}</div>`;
  html+=`<div class="ending-sub">${ending.sub}</div>`;
  html+=`<div class="ending-text">${narrative.text.replace(/\n/g,'<br>')}</div>`;

  // Future mirror
  html+=`<div class="future-section">`;
  html+=`<div class="future-year"><div class="future-year-label">毕业后第 1 年</div><div class="future-year-text">${mirror.y1.replace(/\n/g,'<br>')}</div></div>`;
  html+=`<div class="future-year"><div class="future-year-label">毕业后第 3 年</div><div class="future-year-text">${mirror.y3.replace(/\n/g,'<br>')}</div></div>`;
  html+=`<div class="future-year"><div class="future-year-label">毕业后第 5 年</div><div class="future-year-text">${mirror.y5.replace(/\n/g,'<br>')}</div></div>`;
  html+=`</div>`;

  // Psychology comment
  html+=`<div class="ending-comment"><div class="ending-comment-label">心理学视角</div><div class="ending-comment-text">${narrative.comment.replace(/\n/g,'<br>')}</div></div>`;

  // Summary card
  html+=`<div class="summary-card">`;
  html+=`<div class="summary-item"><div class="summary-label">结局</div><div class="summary-value">${ending.title}</div></div>`;
  html+=`<div class="summary-values">`;
  html+=`<div class="summary-val-item"><div class="summary-val-name" style="color:var(--self-color)">自我方向</div><div class="summary-val-num">${s}</div></div>`;
  html+=`<div class="summary-val-item"><div class="summary-val-name" style="color:var(--self-color)">自我一致</div><div class="summary-val-num">${c}</div></div>`;
  html+=`<div class="summary-val-item"><div class="summary-val-name" style="color:var(--parent-color)">父母认可</div><div class="summary-val-num">${p}</div></div>`;
  html+=`<div class="summary-val-item"><div class="summary-val-name" style="color:var(--parent-color)">相互理解</div><div class="summary-val-num">${u}</div></div>`;
  html+=`</div>`;
  html+=`<div class="summary-item"><div class="summary-label">沟通风格</div><div class="summary-value">${style}</div></div>`;
  html+=`<div class="summary-tip">${tip}</div>`;
  html+=`</div>`;

  // Reflection
  html+=`<div class="reflect-box"><div class="reflect-label">课 后 反 思</div>`;
  html+=`<div class="reflect-q">你上一次跟父母打电话是什么时候？那次通话中，你有没有说过"一切都好"但其实并不好？是什么让你选择了隐瞒？</div>`;
  html+=`<div class="reflect-q">游戏里展示了"他们没说出口的话"——你有没有想过，在你们的真实对话中，父母可能也有很多没说出来的担心和妥协？如果你是他们，你会怎么开口？</div>`;
  html+=`<div class="reflect-q">"理解"不等于"同意"。你觉得有没有可能在不同意父母的前提下，依然让他们觉得被尊重？如果可以，你会怎么做？</div>`;
  html+=`<div class="reflect-hint">这些问题没有标准答案。可以写在纸上，也可以带到课堂讨论中。</div></div>`;

  // Archive
  html+=`<div class="archive-section"><div class="archive-label">存 档 编 号</div><div class="archive-code" id="archive-code">${archiveCode}</div><button class="btn-copy" onclick="copyArchive()">复制编号</button><div class="archive-hint">保存此编号，可与朋友分享你的故事走向</div></div>`;
  html+=`<div style="text-align:center"><button class="btn-restart" onclick="location.reload()">重新开始</button><br><a class="btn-back" href="index.html">返回事件簿</a></div>`;
  html+=`<div class="scroll-anchor"></div>`;
  appendHTML(html);
}

function copyArchive(){
  const code=document.getElementById('archive-code').textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(code).then(()=>{
      const btn=document.querySelector('.btn-copy');
      btn.textContent='已复制';setTimeout(()=>btn.textContent='复制编号',1500);
    });
  }else{
    const r=document.createRange();
    r.selectNode(document.getElementById('archive-code'));
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(r);
    document.execCommand('copy');
    const btn=document.querySelector('.btn-copy');
    btn.textContent='已复制';setTimeout(()=>btn.textContent='复制编号',1500);
  }
